          overwrite: true
          include-hidden-files: true

      - name: Check sonar path
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && checkPathExists ~/.sonar;

      - name: Send codecov report
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          curl --fail-with-body -S \
            --retry 5 \
            --retry-delay 30 \
            --retry-all-errors \
            --connect-timeout 5 \
            -s https://codecov.io/bash \
            | bash -s -- -v -Z -c -f app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml;

      - name: Upload reports as artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # Check available parameters in: https://github.com/actions/upload-artifact/blob/main/action.yml
          name: reports_${{ inputs.android_api }}_d${{ inputs.android_api_device }}_${{ inputs.type }}_${{ inputs.build_os }}_${{ inputs.target_os }}
          path: app/build/reports
          if-no-files-found: error
          retention-days: 90
          overwrite: true
          include-hidden-files: true
