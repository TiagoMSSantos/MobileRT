name: Reusable Android workflow

on:
  workflow_call:
    inputs:
      build_os:
        type: string
        required: true
      target_os:
        type: string
        required: true
      android_api:
        type: string
        required: true
      android_api_device:
        type: string
        required: true
      type:
        type: string
        required: true

permissions: {}

defaults:
  run:
    shell: sh
    working-directory: .

# Default environment variables.
env:
  GITHUB_STEP_TIMEOUT_SMALL: 4
  GITHUB_STEP_TIMEOUT_MEDIUM: 10
  GITHUB_STEP_TIMEOUT_LONG: 20

jobs:
  Build:
    runs-on: ${{ inputs.build_os }}
    name: Build ${{ inputs.android_api }} ${{ inputs.type }} ${{ inputs.build_os }} (${{ inputs.android_api_device }} - ${{ inputs.target_os }})
    timeout-minutes: 360

    # Sets permissions of the GITHUB_TOKEN to allow delete cache
    permissions:
      actions: write

    outputs:
      ndk_version: ${{ steps.android_versions.outputs.NDK_VERSION }}
      cmake_version: ${{ steps.android_versions.outputs.ANDROID_CMAKE_VERSION }}
      android_home: ${{ steps.android_versions.outputs.ANDROID_HOME }}

    steps:
      - name: Checkout
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Check available parameters in: https://github.com/actions/checkout/blob/main/action.yml
          lfs: true

      - name: Set up JDK
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          # Check available parameters in: https://github.com/actions/setup-java/blob/main/action.yml
          java-version: 21
          distribution: zulu
          java-package: jdk
          check-latest: false
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          settings-path: ~/.gradle
          overwrite-settings: true
          gpg-private-key: ''
          gpg-passphrase: GPG_PASSPHRASE
          cache-dependency-path: '**/build.gradle'

      - name: Add custom environment variables
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_LONG) }}
        if: success()
        run: |
          if [ -n "${ANDROID_HOME}" ]; then
            echo 'Available Android versions:';
            ls -lahp ${ANDROID_HOME}/ndk;
            ls -lahp ${ANDROID_HOME}/cmake || true;
            ls -lahp ${ANDROID_HOME}/build-tools;
            ls -lahp ${ANDROID_HOME}/platforms;
            ls -lahp ${ANDROID_HOME}/extras;
            ls -lahp ${ANDROID_HOME};
          fi
          GRADLE_PATH="${HOME}/.gradle";
          echo "GRADLE_PATH=${GRADLE_PATH}" >> "${GITHUB_ENV}";
          mkdir -p "${GRADLE_PATH}";
          df -Pk -h ${HOME};
          env;

      - name: Set Android NDK version
        id: android_versions
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          if [ "${{ inputs.android_api }}" -ge 21 ]; then
            echo "NDK_VERSION=29.0.14206865" >> "${GITHUB_ENV}";
            echo "NDK_VERSION=29.0.14206865" >> "${GITHUB_OUTPUT}";
          elif [ "${{ inputs.android_api }}" -ge 19 ]; then
            echo "NDK_VERSION=25.2.9519653" >> "${GITHUB_ENV}";
            echo "NDK_VERSION=25.2.9519653" >> "${GITHUB_OUTPUT}";
          else
            echo "NDK_VERSION=23.2.8568313" >> "${GITHUB_ENV}";
            echo "NDK_VERSION=23.2.8568313" >> "${GITHUB_OUTPUT}";
          fi
          echo "ANDROID_CMAKE_VERSION=4.0.2" >> "${GITHUB_ENV}";
          echo "ANDROID_CMAKE_VERSION=4.0.2" >> "${GITHUB_OUTPUT}";
          echo "ANDROID_HOME=${ANDROID_HOME}" >> "${GITHUB_ENV}";
          echo "ANDROID_HOME=${ANDROID_HOME}" >> "${GITHUB_OUTPUT}";

      - name: Install Android SDK
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        run: |
          # Portable across Linux, macOS and Windows runners; on pre-provisioned
          # images (e.g. ubuntu-22.04, GitHub macOS/Windows) ANDROID_HOME is
          # already set so this is a no-op. See installAndroidSdk for per-OS
          # archive selection and the Linux ARM multiarch bootstrap.
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && installAndroidSdk "${{ inputs.android_api }}";

      # Useful step to avoid gradle having to download Gradle dependencies
      # Taken from: https://github.com/marketplace/actions/download-workflow-artifact
      - name: Download Gradle packages artifact
        id: download-gradle-artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        continue-on-error: true
        with:
          # Check available parameters in: https://github.com/dawidd6/action-download-artifact/blob/master/action.yml
          # Optional, GitHub token, a Personal Access Token with `public_repo` scope if needed
          # Required, if the artifact is from a different repo
          # Required, if the repo is private a Personal Access Token with `repo` scope is needed
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Optional, workflow file name or ID
          # If not specified, will be inferred from run_id (if run_id is specified), or will be the current workflow
          workflow: android.yml
          # Optional, the status or conclusion of a completed workflow to search for
          # Can be one of a workflow conclusion:
          #   "failure", "success", "neutral", "cancelled", "skipped", "timed_out", "action_required"
          # Or a workflow status:
          #   "completed", "in_progress", "queued"
          workflow_conclusion: ''
          # Optional, will get head commit SHA
          pr: ${{ github.event.pull_request.number }}
          # Optional, no need to specify if PR is
          commit: ${{ github.event.pull_request.head.sha }}
          # Optional, will use the branch
          # branch: master
          # Optional, defaults to all types
          # event: push
          # Optional, will use specified workflow run
          # run_id: 1122334455
          # Optional, run number from the workflow
          # run_number: 34
          # Optional, uploaded artifact name,
          # will download all artifacts if not specified
          # and extract them into respective subdirectories
          # https://github.com/actions/download-artifact#download-all-artifacts
          name: gradle-packages_${{ github.sha }}_${{ github.run_id }}
          # Optional, a directory where to extract artifact(s), defaults to the current directory
          path: ${{ env.GRADLE_PATH }}
          # Optional, defaults to current repo
          repo: ${{ github.repository }}
          allow_forks: true
          # Optional, check the workflow run to whether it has an artifact
          # then will get the last available artifact from the previous workflow
          # default false, just try to download from the last one
          check_artifacts:  true
          # Optional, search for the last workflow run whose stored an artifact named as in `name` input
          # default false
          search_artifacts: true
          # Optional, choose to skip unpacking the downloaded artifact(s)
          # default false
          skip_unpack: true
          # Optional, choose how to exit the action if no artifact is found
          # can be one of:
          #  "fail", "warn", "ignore"
          # default fail
          # warn (not fail): this is a cross-run warm-start. The name is now
          # keyed by the current commit+run, which by definition does not
          # exist yet when the Build job runs (Build is what uploads it), so
          # this download always misses and the job simply cold-starts. It is
          # kept only so a future same-run re-run of Build can reuse it.
          if_no_artifact_found: warn

      - name: Extract and check files from gradle artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success() && steps.download-gradle-artifact.outputs.found_artifact == 'true'
        run: |
          ls -lahp ${{ env.GRADLE_PATH }};
          # dawidd6 (skip_unpack) saves the artifact as <artifact-name>.zip.
          # The artifact name is now commit/run keyed, so normalise the
          # downloaded file back to the fixed name the extract logic expects.
          mv "${{ env.GRADLE_PATH }}"/gradle-packages_*.zip "${{ env.GRADLE_PATH }}"/gradle-packages.zip 2> /dev/null || true;
          ls -lahp ${{ env.GRADLE_PATH }}/gradle-packages.zip;
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && extractFilesFromArtifact ${{ env.GRADLE_PATH }};
          set +e;
          find ${{ env.GRADLE_PATH }} -name "transforms" -exec rm -rf {} \;
          set -e;

      - name: Validate codecov config
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && inputs.type == 'debug'
        run: |
          curl --fail-with-body -S \
            --retry 5 \
            --retry-delay 30 \
            --retry-all-errors \
            --connect-timeout 5 \
            --data-binary @codecov.yml \
            https://codecov.io/validate;

      - name: Install dependencies
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_LONG) }}
        if: success()
        run: |
          sh scripts/install_dependencies.sh;
          echo 'Add binutils to PATH for readelf command in MacOS.';
          echo "/usr/local/opt/binutils/bin" >> ${GITHUB_PATH};
          echo "/opt/homebrew/opt/binutils/bin" >> ${GITHUB_PATH};

      - name: Set Android CPU Architecture
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          echo 'android_arch=\"armeabi-v7a\",\"arm64-v8a\",\"x86\",\"x86_64\"' >> "${GITHUB_ENV}";

      - name: Cache Android CMake
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.ANDROID_HOME }}/cmake/${{ env.ANDROID_CMAKE_VERSION }}
          key: android-${{ inputs.android_api }}-cmake-${{ env.ANDROID_CMAKE_VERSION }}

      - name: Download Android CMake
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && !startsWith(inputs.build_os, 'windows')
        run: |
          . scripts/helper_functions.sh && callCommandUntilSuccess 2 timeout 180 ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install 'cmake;${{ env.ANDROID_CMAKE_VERSION }}';

      - name: Download Android CMake Windows
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && startsWith(inputs.build_os, 'windows')
        run: |
          . scripts/helper_functions.sh && callCommandUntilSuccess 2 timeout 180 ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager.bat --install 'cmake;${{ env.ANDROID_CMAKE_VERSION }}';

      - name: Cache Android NDK
        id: ndk-cache
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          key: android-${{ inputs.android_api }}-ndk-${{ env.NDK_VERSION }}

      - name: Download NDK
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && steps.ndk-cache.outputs.cache-hit != 'true' && !startsWith(inputs.build_os, 'windows')
        run: |
          . scripts/helper_functions.sh && callCommandUntilSuccess 2 timeout 180 ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.NDK_VERSION }}";

      - name: Download NDK Windows
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && steps.ndk-cache.outputs.cache-hit != 'true' && startsWith(inputs.build_os, 'windows')
        run: |
          . scripts/helper_functions.sh && callCommandUntilSuccess 2 timeout 180 ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager.bat --install "ndk;${{ env.NDK_VERSION }}";

      - name: Save Android NDK to cache
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_LONG) }}
        if: success() && steps.ndk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          key: android-${{ inputs.android_api }}-ndk-${{ env.NDK_VERSION }}
          upload-chunk-size: 536870912

      - name: Setup ccache for Android C++ builds
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
        with:
          key: android-ccache-${{ inputs.android_api }}-${{ inputs.type }}-${{ inputs.build_os }}-${{ github.sha }}
          max-size: 2G
          variant: ccache
          save: true

      - name: Set ccache as CMake compiler launcher
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          echo 'CMAKE_C_COMPILER_LAUNCHER=ccache' >> "${GITHUB_ENV}";
          echo 'CMAKE_CXX_COMPILER_LAUNCHER=ccache' >> "${GITHUB_ENV}";
          # The Android NDK clang++ is restored from the NDK cache with a
          # different mtime in the Build vs test job, so the default
          # compiler_check=mtime makes ccache treat it as a new compiler and
          # miss 100%. Hash the compiler contents instead, and make the cache
          # path-independent so Build-job entries are reused by the test jobs.
          echo 'CCACHE_COMPILERCHECK=content' >> "${GITHUB_ENV}";
          echo 'CCACHE_BASEDIR=${{ github.workspace }}' >> "${GITHUB_ENV}";
          echo 'CCACHE_SLOPPINESS=time_macros,include_file_mtime,include_file_ctime,locale,pch_defines' >> "${GITHUB_ENV}";

      - name: Download Android dependencies
        timeout-minutes: 8
        if: success()
        run: |
          . scripts/helper_functions.sh && callCommandUntilSuccess 5 timeout 180 sh gradlew build --dry-run -Dorg.gradle.configuration-cache=false --parallel \
            -DtestType="${{ inputs.type }}" -DandroidApiVersion="${{ inputs.android_api }}" -DabiFilters="[${{ env.android_arch }}]" \
            --info --warning-mode all --stacktrace;

      - name: Build ${{ inputs.type }}
        timeout-minutes: 30
        if: success()
        env:
          ANDROID_KEYSTORE_PASSWORD_DEBUG: ${{ secrets.ANDROID_KEYSTORE_PASSWORD_DEBUG }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD_DEBUG: ${{ secrets.ANDROID_KEY_PASSWORD_DEBUG }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS_DEBUG: ${{ secrets.ANDROID_KEY_ALIAS_DEBUG }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          ls -lahp ${ANDROID_HOME}/ndk/${{ env.NDK_VERSION }};
          echo "${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}" | base64 -d > app/MobileRT.jks;
          echo "android_arch: ${{ env.android_arch }}";
          sh scripts/compile_android.sh -t ${{ inputs.type }} -r yes -a ${{ inputs.android_api }} -f ${{ env.android_arch }};
          rm app/MobileRT.jks;

      - name: Print error logs
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: failure()
        run: |
          ls -lahp .;
          set +e;
          echo 'Print JVM errors if provided by Kernel, and just check the logs from the last line of the previous call:';
          sudo dmesg -T;
          echo 'Print native JVM stacktrace if possible:';
          cat hs_err_pid*.log;
          set -e;

      - name: Upload problems reports as artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: failure()
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          # Retry to survive transient ENOTFOUND/DNS blips reaching the GitHub
          # artifact backend ("Failed to CreateArtifact: Unable to make
          # request: ENOTFOUND"). upload-artifact is a plain JS action, so it
          # is wrappable by wretry (unlike composite actions).
          action: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/actions/upload-artifact/blob/main/action.yml
            name: problems-report
            path: |
              build/reports
              app/build/reports
            if-no-files-found: error
            retention-days: 90
            overwrite: true
            include-hidden-files: true

      - name: Check binaries' paths
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          find app/build/ -iname "*.class";
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && checkPathExists app/build;
          . scripts/helper_functions.sh && checkPathExists app/build/intermediates;
          . scripts/helper_functions.sh && checkPathExists app/build/intermediates/javac;
          if [ "${{ inputs.type }}" = 'debug' ]; then
            . scripts/helper_functions.sh && checkPathExists app/build/intermediates/javac/debug;
          fi
          . scripts/helper_functions.sh && checkPathExists app/.cxx;
          . scripts/helper_functions.sh && checkPathExists app/third_party;
          . scripts/helper_functions.sh && checkPathExists ${{ env.GRADLE_PATH }};
          if [ "${{ inputs.android_api }}" -gt 15 ]; then
            typeWithCapitalLetter=$(. scripts/helper_functions.sh && capitalizeFirstletter ${{ inputs.type }});
            . scripts/helper_functions.sh && checkPathExists app/build/intermediates/javac/${{ inputs.type }}/compile${typeWithCapitalLetter}JavaWithJavac/classes;
            # . scripts/helper_functions.sh && checkPathExists app/build/intermediates/built_in_kotlinc/${{ inputs.type }}/compile${typeWithCapitalLetter}Kotlin/classes;
          else
            if [ "${{ inputs.type }}" = 'debug' ]; then
              . scripts/helper_functions.sh && checkPathExists app/build/tmp/kotlin-classes/debug;
            fi
          fi

      # Hand the compiled binaries to the downstream test/Sonar jobs as an
      # ARTIFACT, not via actions/cache. Per-run caches keyed by run id are
      # big (~hundreds of MB x matrix) and routinely LRU-evicted under the
      # 10 GB Actions-cache cap before the later jobs restore them. Artifacts
      # use a separate store that is not subject to that LRU. The Gradle
      # build-cache (~/.gradle/caches/build-cache-*) is intentionally NOT
      # included here because it is already handed off via the gradle-packages
      # artifact (see the "Zip Gradle packages" step below).
      - name: Upload generated binaries as artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          # Retry to survive transient ENOTFOUND/DNS blips reaching the GitHub
          # artifact backend ("Failed to CreateArtifact: Unable to make
          # request: ENOTFOUND"). upload-artifact is a plain JS action, so it
          # is wrappable by wretry (unlike composite actions).
          action: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/actions/upload-artifact/blob/main/action.yml
            name: compiled_${{ github.sha }}_${{ github.run_id }}_a${{ inputs.android_api }}_d${{ inputs.android_api_device }}_${{ inputs.type }}_${{ inputs.build_os }}_${{ inputs.target_os }}
            path: |
              app/build
              app/.cxx
              gradle/wrapper
              gradlew
              gradlew.bat
            if-no-files-found: error
            # Ephemeral intra-run handoff (consumed by the test/Sonar jobs in
            # the same run, never needed afterwards). Keep retention at the
            # 1-day minimum so these large artifacts do not pile up in storage.
            retention-days: 1
            overwrite: true
            include-hidden-files: true

      - name: Zip Gradle packages
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        run: |
          set +e;
          ls -lahp ${{ env.GRADLE_PATH }};
          ls -lahp ${{ env.GRADLE_PATH }}/caches;
          ls -lahp ${{ env.GRADLE_PATH }}/wrapper/dists;
          ls -lahp ${{ env.GRADLE_PATH }}/daemon;
          ls -lahp ${{ env.GRADLE_PATH }}/notifications;
          ls -lahp ${{ env.GRADLE_PATH }}/jdks;
          ls -lahp ${{ env.GRADLE_PATH }}/kotlin-profile;
          ls -lahp ${{ env.GRADLE_PATH }}/workers;
          ls -lahp ${{ env.GRADLE_PATH }}/native;

          echo 'Deleting unnecessary cache.';
          rm -rf ${{ env.GRADLE_PATH }}/caches/journal-*;
          rm -rf ${{ env.GRADLE_PATH }}/caches/transforms-4;
          rm -rf ${{ env.GRADLE_PATH }}/daemon;
          rm -rf ${{ env.GRADLE_PATH }}/jdks;
          rm -rf ${{ env.GRADLE_PATH }}/kotlin-profile;
          rm -rf ${{ env.GRADLE_PATH }}/workers;
          rm -rf ${{ env.GRADLE_PATH }}/native;
          rm -rf ${{ env.GRADLE_PATH }}/.tmp;
          rm -rf ${{ env.GRADLE_PATH }}/notifications;

          find ${{ env.GRADLE_PATH }}/wrapper/dists -not -iname '*gradle*.zip' -delete;
          find ${{ env.GRADLE_PATH }} \( \
            -iname "docs" -o \
            -iname "transforms" -o \
            -iname "*README*" -o -iname "*NOTICE*" -o -iname "*LICENSE*" -o \
            -iname "*.log*" -o -iname "*.txt*" -o -iname "*.md*" -o \
            -iname "*.doc*" -o -iname "*.xls*" -o -iname "*.htm*" -o \
            -iname "*.lock*" -o -iname "*.lck*" -o -iname "*.ok*" -o \
            -iname "*.png*" -o -iname "*.jpg*" -o -iname "*.jpeg*" -o -iname "*.gif*" \
          \) -exec rm -rf {} +;
          find ${{ env.GRADLE_PATH }} \( -empty -o -size 0 \) -exec rm -rf {} +;
          set -e;

          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && zipFilesForArtifact ${{ env.GRADLE_PATH }} gradle-packages.zip;

      - name: Upload Gradle packages as artifact
        timeout-minutes: 20
        if: success() && strategy.job-index == 0
        continue-on-error: true
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          # Retry to survive transient ENOTFOUND/DNS blips reaching the GitHub
          # artifact backend ("Failed to CreateArtifact: Unable to make
          # request: ENOTFOUND"). upload-artifact is a plain JS action, so it
          # is wrappable by wretry (unlike composite actions).
          action: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/actions/upload-artifact/blob/main/action.yml
            name: gradle-packages_${{ github.sha }}_${{ github.run_id }}
            path: ${{ env.GRADLE_PATH }}/gradle-packages.zip
            if-no-files-found: error
            retention-days: 90
            compression-level: 1
            overwrite: true
            include-hidden-files: true

      - name: Sign APK
        id: sign-apk
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: ilharp/sign-android-release@13dd52242698526f951aa8bb8696204f6fea702a # v2
        with:
          # Check available parameters in: https://github.com/ilharp/sign-android-release/blob/master/action.yml
          releaseDir: app/build/outputs/apk/${{ inputs.type }}
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK as artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          # Retry to survive transient ENOTFOUND/DNS blips reaching the GitHub
          # artifact backend ("Failed to CreateArtifact: Unable to make
          # request: ENOTFOUND"). upload-artifact is a plain JS action, so it
          # is wrappable by wretry (unlike composite actions).
          action: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/actions/upload-artifact/blob/main/action.yml
            name: MobileRT_${{ inputs.type }}_min_android_api-${{ inputs.android_api }}-apk
            path: ${{ steps.sign-apk.outputs.signedFile }}
            if-no-files-found: error
            retention-days: 90
            overwrite: true
            include-hidden-files: true


  AndroidTests:
    needs: [Build]
    name: Android tests ${{ inputs.android_api }} ${{ inputs.type }} ${{ inputs.build_os }} (${{ inputs.android_api_device }} - ${{ inputs.target_os }})
    runs-on: ${{ inputs.target_os }}
    timeout-minutes: 360

    # Sets permissions of the GITHUB_TOKEN to allow delete cache and publish test results
    permissions:
      actions: write
      checks: write
      pull-requests: write # only required if `comment: true` was enabled

    steps:
      - name: Checkout
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Check available parameters in: https://github.com/actions/checkout/blob/main/action.yml
          lfs: true

      - name: Set up JDK
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          # Check available parameters in: https://github.com/actions/setup-java/blob/main/action.yml
          java-version: 21
          distribution: zulu
          java-package: jdk
          check-latest: false
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          settings-path: ~/.gradle
          overwrite-settings: true
          gpg-private-key: ''
          gpg-passphrase: GPG_PASSPHRASE
          cache-dependency-path: '**/build.gradle'

      - name: Free up disk space
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        run: |
          echo 'Disk usage before cleanup:';
          df -Ph / "${HOME}" 2>/dev/null || true;
          # Delete only pre-installed toolchains this Android job never uses.
          # Keep: Android SDK/NDK/CMake, the active JDK, rust (cargo/rustup),
          # and the default Xcode (xcrun/simctl below depend on it).
          case "$(uname -s)" in
            Linux*)
              echo 'Cleaning up Linux runner disk space...';
              # The runner image ships ~20 GB of language toolchains (JDK, .NET,
              # Swift, Haskell, Julia, Chromium, etc.) that the Android emulator
              # job does not need but which would otherwise consume disk space the
              # emulator needs. Run all rm -rf calls in parallel — each target is
              # independent and rm -rf is I/O bound, so overlapping the I/O
              # noticeably cuts the cleanup time (~1m -> ~20s on a typical run).
              if command -v sudo > /dev/null; then
                echo 'Cleaning up runner disk space by deleting unneeded pre-installed toolchains...';
                sudo rm -rf "${AGENT_TOOLSDIRECTORY}"/CodeQL &
                sudo rm -rf /usr/share/dotnet &
                sudo rm -rf /opt/ghc &
                sudo rm -rf /mnt/swapfile &
                sudo rm -rf /usr/share/swift &
                sudo rm -rf /usr/local/.ghcup &
                sudo rm -rf /usr/local/julia* &
                sudo rm -rf /usr/local/share/chromium &
                sudo rm -rf /opt/microsoft &
                sudo rm -rf /opt/google &
                sudo rm -rf /opt/az &
                sudo rm -rf /usr/local/share/powershell &
                sudo rm -rf /opt/pipx &
                sudo rm -rf /usr/share/miniconda &
                sudo rm -rf /usr/local/graalvm &
                sudo rm -rf /usr/local/share/vcpkg &
                sudo rm -rf /usr/local/share/boost &
                sudo rm -rf /usr/lib/mono &
                sudo rm -rf /usr/lib/google-cloud-sdk &
                sudo rm -rf /usr/local/lib/heroku &
                wait;
              fi
              if command -v docker > /dev/null; then
                # Single `docker system prune --all --volumes --force` is a superset
                # of the previous container/network/volume prunes; combining them
                # avoids walking docker's state multiple times.
                echo 'Cleaning up runner disk space by pruning Docker containers, images, volumes and builder cache...';
                docker rm -f "$(docker ps -a | awk 'NR>1 {print $1}')" || true;
                # shellcheck disable=SC2046 # intentional word-split: one arg per image id
                docker rmi $(docker image ls -aq) 2>/dev/null || true;
                docker system prune --all --volumes --force;
                docker builder prune --all --force;
                docker system df;
              fi
              sudo apt-get clean || true;
              ;;
            Darwin*)
              echo 'Cleaning up macOS runner disk space...';
              # Remove the non-default Xcode versions (~15 GB each); keep only the
              # one xcode-select points at, since xcrun/simctl below depend on it.
              xcodeActive="$(xcode-select -p 2>/dev/null | sed 's#/Contents/Developer$##')";
              for xcodeApp in /Applications/Xcode_*.app; do
                [ -e "${xcodeApp}" ] || continue;
                [ "${xcodeApp}" = "${xcodeActive}" ] && continue;
                if command -v sudo > /dev/null; then
                  sudo rm -rf "${xcodeApp}" &
                fi
              done
              # iOS/tvOS/watchOS simulator runtimes (user + system), devices, caches.
              rm -rf "${HOME}/Library/Developer/CoreSimulator/Profiles/Runtimes/"* &
              rm -rf "${HOME}/Library/Developer/CoreSimulator/Devices/"* &
              rm -rf "${HOME}/Library/Developer/CoreSimulator/Caches/"* &
              if command -v sudo > /dev/null; then
                sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* &
                # Toolchains the Android job never uses.
                sudo rm -rf /Library/Frameworks/Mono.framework &
              fi
              # Xcode derived data / device support (regenerated on demand).
              rm -rf "${HOME}/Library/Developer/Xcode/DerivedData/"* &
              rm -rf "${HOME}/Library/Developer/Xcode/iOS DeviceSupport/"* &
              rm -rf "${HOME}/Library/Developer/Xcode/watchOS DeviceSupport/"* &
              rm -rf "${HOME}/Library/Developer/Xcode/tvOS DeviceSupport/"* &
              rm -rf "${HOME}/.cocoapods" &
              rm -rf "${HOME}/Library/Caches/"* &
              wait;
              # Homebrew download cache (keep installed formulae, drop tarballs).
              if command -v brew >/dev/null 2>&1; then
                brew cleanup -s 2>/dev/null || true;
                rm -rf "$(brew --cache)" 2>/dev/null || true;
              fi
              # Pruning symbolic links and directories from /usr/local takes some minutes
              # xcrun simctl delete unavailable 2>/dev/null || true;
              ;;
          esac
          echo 'Disk usage after cleanup:';
          df -Ph / "${HOME}" 2>/dev/null || true;

      - name: Add custom environment variables
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_LONG) }}
        if: success()
        run: |
          export ANDROID_HOME=${{ needs.Build.outputs.android_home }};
          echo "ANDROID_HOME=${ANDROID_HOME}" >> "${GITHUB_ENV}";
          if [ -n "${ANDROID_HOME}" ] && [ -d "${ANDROID_HOME}" ]; then
            echo 'Available Android versions:';
            ls -lahp ${ANDROID_HOME};
            # Empty NDK / extras / cmake to free disk space; the Cache Android
            # CMake / NDK steps later will populate them from cache (or from
            # sdkmanager on cache miss). Plain `rm -rf` instead of separate
            # rm+mkdir — the Cache restore creates the target path itself.
            rm -rf ${ANDROID_HOME}/ndk &
            rm -rf ${ANDROID_HOME}/extras &
            rm -rf ${ANDROID_HOME}/cmake &
            wait;
          fi
          GRADLE_PATH="${HOME}/.gradle";
          echo "GRADLE_PATH=${GRADLE_PATH}" >> "${GITHUB_ENV}";
          mkdir -p "${GRADLE_PATH}";
          df -Pk -h ${HOME};
          env;
          df -h;

      - name: Install Android SDK
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        run: |
          # Bootstraps the SDK so later steps can use sdkmanager (NDK), adb (the
          # timeout-shim) and android-emulator-runner. Portable across Linux,
          # macOS and Windows; a no-op on images that pre-install the SDK. See
          # installAndroidSdk for per-OS archive + Linux ARM multiarch handling.
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && installAndroidSdk "${{ inputs.android_api_device }}";

      - name: Download Android NDK from cache
        id: ndk-cache
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          key: android-${{ inputs.android_api }}-ndk-${{ needs.Build.outputs.ndk_version }}
          enableCrossOsArchive: true
          path: ${{ env.ANDROID_HOME }}/ndk/${{ needs.Build.outputs.ndk_version }}

      - name: Download NDK
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && steps.ndk-cache.outputs.cache-hit != 'true' && !startsWith(inputs.target_os, 'windows')
        run: |
          . scripts/helper_functions.sh && callCommandUntilSuccess 2 timeout 180 ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ needs.Build.outputs.ndk_version }}";

      - name: Download NDK Windows
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && steps.ndk-cache.outputs.cache-hit != 'true' && startsWith(inputs.target_os, 'windows')
        run: |
          . scripts/helper_functions.sh && callCommandUntilSuccess 2 timeout 180 ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager.bat --install "ndk;${{ needs.Build.outputs.ndk_version }}";

      # Useful step to avoid gradle having to download Gradle dependencies
      # Taken from: https://github.com/marketplace/actions/download-workflow-artifact
      - name: Download Gradle packages artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          action: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
          pre_retry_command: 'echo "Retrying Download Gradle packages artifact step..."'
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/dawidd6/action-download-artifact/blob/master/action.yml
            # Optional, GitHub token, a Personal Access Token with `public_repo` scope if needed
            # Required, if the artifact is from a different repo
            # Required, if the repo is private a Personal Access Token with `repo` scope is needed
            github_token: ${{ secrets.GITHUB_TOKEN }}
            # Optional, workflow file name or ID
            # If not specified, will be inferred from run_id (if run_id is specified), or will be the current workflow
            workflow: android.yml
            # Optional, the status or conclusion of a completed workflow to search for
            # Can be one of a workflow conclusion:
            #   "failure", "success", "neutral", "cancelled", "skipped", "timed_out", "action_required"
            # Or a workflow status:
            #   "completed", "in_progress", "queued"
            workflow_conclusion: ''
            # Optional, will get head commit SHA
            pr: ${{ github.event.pull_request.number }}
            # Optional, no need to specify if PR is
            commit: ${{ github.event.pull_request.head.sha }}
            # Optional, will use the branch
            # branch: master
            # Optional, defaults to all types
            # event: push
            # Optional, will use specified workflow run
            # Pin to THIS run so the same-run artifact is read by run_id directly,
            # not via the flaky cross-run search that paginates GitHub's artifact
            # API and transiently misses it (cf. CI run 26244860134: only the API
            # 15 Unit tests job missed, hard-failing via if_no_artifact_found: fail).
            run_id: ${{ github.run_id }}
            # Optional, run number from the workflow
            # run_number: 34
            # Optional, uploaded artifact name,
            # will download all artifacts if not specified
            # and extract them into respective subdirectories
            # https://github.com/actions/download-artifact#download-all-artifacts
            name: gradle-packages_${{ github.sha }}_${{ github.run_id }}
            # Optional, a directory where to extract artifact(s), defaults to the current directory
            path: ${{ env.GRADLE_PATH }}
            # Optional, defaults to current repo
            repo: ${{ github.repository }}
            allow_forks: true
            # Optional, check the workflow run to whether it has an artifact
            # then will get the last available artifact from the previous workflow
            # default false, just try to download from the last one
            check_artifacts:  true
            # Optional, search for the last workflow run whose stored an artifact named as in `name` input
            # default false
            search_artifacts: true
            # Optional, choose to skip unpacking the downloaded artifact(s)
            # default false
            skip_unpack: true
            # Optional, choose how to exit the action if no artifact is found
            # can be one of:
            #  "fail", "warn", "ignore"
            # default fail
            if_no_artifact_found: fail

      - name: Download generated Android APK artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          action: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
          pre_retry_command: 'echo "Retrying Download generated Android APK artifact step..."'
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/dawidd6/action-download-artifact/blob/master/action.yml
            workflow_conclusion: ''
            commit: ${{ github.event.pull_request.head.sha }}
            name: MobileRT_${{ inputs.type }}_min_android_api-${{ inputs.android_api }}-apk
            allow_forks: true
            check_artifacts:  true
            search_artifacts: true
            skip_unpack: true

      - name: Extract and check files from artifacts
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        run: |
          ls -lahp ${{ env.GRADLE_PATH }};
          # dawidd6 (skip_unpack) saves the artifact as <artifact-name>.zip.
          # The artifact name is now commit/run keyed, so normalise the
          # downloaded file back to the fixed name the extract logic expects.
          mv "${{ env.GRADLE_PATH }}"/gradle-packages_*.zip "${{ env.GRADLE_PATH }}"/gradle-packages.zip 2> /dev/null || true;
          ls -lahp ${{ env.GRADLE_PATH }}/gradle-packages.zip;
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && extractFilesFromArtifact ${{ env.GRADLE_PATH }};
          echo 'Extracting Android APK release';
          mkdir -p release/android;
          mv MobileRT_${{ inputs.type }}_min_android_api-${{ inputs.android_api }}-apk.zip release/android;
          ls -lahp release/android/MobileRT_${{ inputs.type }}_min_android_api-${{ inputs.android_api }}-apk.zip;
          . scripts/helper_functions.sh && extractFilesFromArtifact release/android;
          mv release/android/app-${{ inputs.type }}-signed.apk release/android/MobileRT_${{ inputs.type }}_min_android_api-${{ inputs.android_api }}.apk;
          ls -lahp release/android/MobileRT_${{ inputs.type }}_min_android_api-${{ inputs.android_api }}.apk;

      - name: Install dependencies
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_LONG) }}
        if: success()
        run: |
          sh scripts/install_dependencies.sh;
          echo 'Add binutils to PATH for readelf command in MacOS.';
          echo "/usr/local/opt/binutils/bin" >> ${GITHUB_PATH};
          echo "/opt/homebrew/opt/binutils/bin" >> ${GITHUB_PATH};

      # Restore the compiled binaries from the artifact uploaded by the Build
      # job (not actions/cache: per-run caches are LRU-evicted under the 10 GB
      # cap before this job runs). The Gradle build-cache is restored
      # separately from the gradle-packages artifact. if_no_artifact_found:
      # fail keeps this a hard dependency - the job fails if it is missing.
      - name: Download generated binaries artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          action: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
          pre_retry_command: 'echo "Retrying Download generated binaries artifact step..."'
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/dawidd6/action-download-artifact/blob/master/action.yml
            github_token: ${{ secrets.GITHUB_TOKEN }}
            workflow: android.yml
            workflow_conclusion: ''
            pr: ${{ github.event.pull_request.number }}
            commit: ${{ github.event.pull_request.head.sha }}
            name: compiled_${{ github.sha }}_${{ github.run_id }}_a${{ inputs.android_api }}_d${{ inputs.android_api_device }}_${{ inputs.type }}_${{ inputs.build_os }}_${{ inputs.target_os }}
            path: .
            repo: ${{ github.repository }}
            allow_forks: true
            check_artifacts: true
            search_artifacts: true
            if_no_artifact_found: fail

      - name: Check binaries' paths
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          echo 'Deleting JSON files from build cache to allow execute Android tests in a different host OS';
          find app/.cxx/ -iname "*.json" -delete;
          find app/build/ -iname "*.class";
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && checkPathExists app/build;
          . scripts/helper_functions.sh && checkPathExists app/build/intermediates;
          . scripts/helper_functions.sh && checkPathExists app/build/intermediates/javac;
          if [ "${{ inputs.type }}" = 'debug' ]; then
            . scripts/helper_functions.sh && checkPathExists app/build/intermediates/javac/debug;
          fi
          . scripts/helper_functions.sh && checkPathExists app/.cxx;
          . scripts/helper_functions.sh && checkPathExists app/third_party;
          . scripts/helper_functions.sh && checkPathExists ${{ env.GRADLE_PATH }};
          if [ "${{ inputs.android_api }}" -gt 15 ]; then
            typeWithCapitalLetter=$(. scripts/helper_functions.sh && capitalizeFirstletter ${{ inputs.type }});
            . scripts/helper_functions.sh && checkPathExists app/build/intermediates/javac/${{ inputs.type }}/compile${typeWithCapitalLetter}JavaWithJavac/classes;
            # . scripts/helper_functions.sh && checkPathExists app/build/intermediates/built_in_kotlinc/${{ inputs.type }}/compile${typeWithCapitalLetter}Kotlin/classes;
          else
            if [ "${{ inputs.type }}" = 'debug' ]; then
              . scripts/helper_functions.sh && checkPathExists app/build/tmp/kotlin-classes/debug;
            fi
          fi

      - name: Restore ccache for Android C++ builds
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
        with:
          key: android-ccache-${{ inputs.android_api }}-${{ inputs.type }}-${{ inputs.build_os }}-${{ github.sha }}
          max-size: 2G
          variant: ccache
          save: false

      - name: Set ccache as CMake compiler launcher
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          echo 'CMAKE_C_COMPILER_LAUNCHER=ccache' >> "${GITHUB_ENV}";
          echo 'CMAKE_CXX_COMPILER_LAUNCHER=ccache' >> "${GITHUB_ENV}";
          # The Android NDK clang++ is restored from the NDK cache with a
          # different mtime in the Build vs test job, so the default
          # compiler_check=mtime makes ccache treat it as a new compiler and
          # miss 100%. Hash the compiler contents instead, and make the cache
          # path-independent so Build-job entries are reused by the test jobs.
          echo 'CCACHE_COMPILERCHECK=content' >> "${GITHUB_ENV}";
          echo 'CCACHE_BASEDIR=${{ github.workspace }}' >> "${GITHUB_ENV}";
          echo 'CCACHE_SLOPPINESS=time_macros,include_file_mtime,include_file_ctime,locale,pch_defines' >> "${GITHUB_ENV}";

      - name: Enable KVM group permissions
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && startsWith(inputs.target_os, 'ubuntu')
        run: |
          # GitHub-hosted ARM runners (ubuntu-24.04-arm) do not expose nested
          # virtualization, so /dev/kvm is absent and `udevadm trigger
          # --name-match=kvm` fails with "Failed to open the device 'kvm':
          # Invalid argument". ARM emulators run the ARM system image natively
          # without KVM, so the step is safe to skip in that case.
          if [ -e /dev/kvm ]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules;
            sudo udevadm control --reload-rules;
            sudo udevadm trigger --name-match=kvm;
          else
            echo 'No /dev/kvm device present; skipping KVM group permissions (typical on ARM runners).';
          fi

      - name: Set Android CPU Architecture
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          echo 'android_arch=\"armeabi-v7a\",\"arm64-v8a\",\"x86\",\"x86_64\"' >> "${GITHUB_ENV}";
          cpuArch=$(uname -m);
          # Linux's `uname -m` returns 'aarch64' for ARM64 hosts (the macOS/iOS
          # 'arm64' string never appears on a GitHub Linux runner). Both are
          # accepted here so the detection is correct on any future host arch
          # naming change.
          if [ "${cpuArch}" = 'arm64' ] || [ "${cpuArch}" = 'aarch64' ]; then
            # API 21+ has arm64-v8a system images; older APIs only have
            # armeabi-v7a, so the emulator must use that on ARM hosts for
            # legacy APIs.
            if [ "${{ inputs.android_api_device }}" -ge 21 ]; then
              echo 'android_emulator_arch=arm64-v8a' >> "${GITHUB_ENV}";
            else
              echo 'android_emulator_arch=armeabi-v7a' >> "${GITHUB_ENV}";
            fi
            # Not all GitHub Apple Silicon runner images expose
            # Hypervisor.framework; `-accel on` then hard-fails with
            # 'HVF error: HV_UNSUPPORTED' / 'failed to initialize HVF'. Fall
            # back to software acceleration (TCG) on ARM hosts.
            echo 'EMULATOR_ACCEL=off' >> "${GITHUB_ENV}";
          else
            if [ "${{ inputs.android_api_device }}" -gt 20 ] && [ "${{ inputs.android_api_device }}" -ne 24 ] && [ "${{ inputs.android_api_device }}" -ne 25 ] && [ "${{ inputs.android_api_device }}" -ne 27 ]; then
              echo 'android_emulator_arch=x86_64' >> "${GITHUB_ENV}";
            else
              echo 'android_emulator_arch=x86' >> "${GITHUB_ENV}";
            fi
            # x86 hosts (Intel runners) have working HVF for x86 guests.
            echo 'EMULATOR_ACCEL=on' >> "${GITHUB_ENV}";
          fi
          # Right-sized to observed reality: a healthy emulator boot on these
          # runners completes in ~15-30s (logs across APIs). The old 240/400s
          # values were ~8-25x over-provisioned, so when an emulator wedged the
          # android-emulator-runner step idled the full boot-timeout before
          # failing - even after the adb timeout-shim had already detected and
          # killed the wedged emulator (~90s). 180s keeps >5x headroom over a
          # healthy boot yet lets a wedged attempt fail fast so wretry retries
          # on a fresh emulator promptly instead of burning the 20-min cap.
          echo "EMULATOR_BOOT_TIMEOUT=300" >> "${GITHUB_ENV}";

      - name: Set CPU cores
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          echo "android_arch: ${{ env.android_arch }}";
          echo "android_emulator_arch: ${{ env.android_emulator_arch }}";
          . scripts/helper_functions.sh && parallelizeBuild && echo "NCPU_CORES=${NCPU_CORES}" >> "${GITHUB_ENV}";

      - name: Download Android dependencies
        timeout-minutes: 8
        if: success()
        run: |
          if [ "${{ inputs.type }}" = 'debug' ]; then
            gradle_command='jacocoTestReport';
          else
            gradle_command='connectedAndroidTest';
          fi
          . scripts/helper_functions.sh && callCommandUntilSuccess 5 timeout 180 sh gradlew "${gradle_command}" --dry-run -Dorg.gradle.configuration-cache=false --parallel \
            -DtestType="${{ inputs.type }}" -DandroidApiVersion="${{ inputs.android_api }}" -DabiFilters="[${{ env.android_arch }}]" \
            --info --warning-mode all --stacktrace;

      - name: AVD cache
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && !startsWith(inputs.target_os, 'windows')
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: avd-cache
        with:
          # Caches the AVD definition + the post-boot snapshot. On hit, the
          # emulator-runner skips both AVD creation (~30s) and cold boot
          # (~3-5 min), starting from the snapshot in ~30-60s. Bump the
          # trailing version suffix (-v1) to invalidate stale snapshots.
          # The system-image `target` (default/google_apis) is part of the key:
          # the cached AVD's config.ini hardcodes the tag chosen at creation, so
          # a target change must rotate the cache - otherwise a stale `default`
          # AVD is restored against a freshly-installed `google_apis` image (or
          # vice versa), and the emulator dies on "Broken AVD system path". Keep
          # this ternary in sync with the `target:` inputs of the steps below.
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ inputs.android_api_device }}-${{ inputs.android_api_device == 26 && 'default' || 'google_apis' }}-${{ env.android_emulator_arch }}-${{ runner.os }}-v1

      - name: Install adb timeout-shim
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && !startsWith(inputs.target_os, 'windows')
        run: |
          set -eu
          # ReactiveCircus/android-emulator-runner's wait-for-boot loop runs
          # `adb -s emulator-<id> shell getprop sys.boot_completed` with NO
          # per-call timeout. When the guest adbd wedges while the emulator
          # process is still alive, that adb call blocks forever; the action's
          # emulator-boot-timeout never fires (it is only checked between
          # iterations) and wretry never retries (a hang is not a failure), so
          # the whole step burns until GitHub's SIGINT (~20 min), killing
          # every wretry attempt with it.
          #
          # The same hang affects post-boot adb calls the action makes
          # itself - e.g. `adb -s emulator-<id> shell input keyevent 82` to
          # unlock the device, which has been observed to idle the full 300s
          # before the action terminates and wretry retries.
          #
          # The action invokes adb by ABSOLUTE path, so a PATH shim cannot
          # intercept it; replace the binary in place with a wrapper that
          # tiers adb calls by source:
          #   * boot poll (`getprop sys.boot_completed`): 45s bound AND,
          #     on 2 consecutive timeouts (~90s), actively kill the wedged
          #     emulator so the step fails right away and wretry retries on
          #     a FRESH emulator (which boots in ~15-30s);
          #   * any other call carrying `-s emulator-<id>` (the action's
          #     marker - scripts in this repo never use it): 60s bound, so
          #     a wedged post-boot setup call fails the attempt fast;
          #   * everything else (the repo's own script calls, which already
          #     wrap adb in `timeout 300`): keep the generous 300s bound, so
          #     legitimate long pm install/pull operations are not killed.
          PT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}/platform-tools"
          if [ ! -x "${PT}/adb.real" ]; then
            mv "${PT}/adb" "${PT}/adb.real"
          fi
          cat > "${PT}/adb" <<EOF
          #!/usr/bin/env sh
          # adb timeout-shim - see the "Install adb timeout-shim" workflow step.
          ADB_REAL="${PT}/adb.real"
          case " \$* " in
            *" getprop sys.boot_completed"*)
              # Detect a wedged-but-alive emulator fast and force a retry.
              HANG_STATE=/tmp/adb-shim-boot-hangs
              timeout -k 5s -s TERM 45s "\$ADB_REAL" "\$@"
              rc=\$?
              if [ "\$rc" -eq 124 ] || [ "\$rc" -eq 137 ]; then
                n=\$(( \$(cat "\$HANG_STATE" 2>/dev/null || echo 0) + 1 ))
                echo "\$n" > "\$HANG_STATE"
                if [ "\$n" -ge 2 ]; then
                  echo "adb timeout-shim: boot poll hung \${n}x consecutively; emulator is wedged - killing it so the test step fails fast and wretry retries on a fresh emulator." >&2
                  "\$ADB_REAL" emu kill >/dev/null 2>&1 || true
                  pkill -9 -f qemu-system >/dev/null 2>&1 || true
                  rm -f "\$HANG_STATE"
                fi
              else
                rm -f "\$HANG_STATE"
              fi
              exit "\$rc" ;;
            *" -s emulator-"*)
              # Any other action-level adb call (e.g. the post-boot
              # 'input keyevent 82' device unlock) can also hang on a
              # wedged-but-alive emulator. The scripts in this repo never
              # use '-s emulator-<id>', so that prefix is a precise marker for
              # the action's calls - bound them short (60s) so a hang fails
              # the attempt fast instead of idling the default 300s before
              # the action terminates and wretry retries.
              exec timeout -k 5s -s TERM 60s "\$ADB_REAL" "\$@" ;;
            *)
              exec timeout -k 10s -s TERM 300s "\$ADB_REAL" "\$@" ;;
          esac
          EOF
          chmod +x "${PT}/adb";
          echo "adb timeout-shim installed at ${PT}/adb";
          "${PT}/adb" --version | head -n 1 || true;

      - name: Create AVD and generate snapshot for caching
        timeout-minutes: 20
        if: success() && !startsWith(inputs.target_os, 'windows') && steps.avd-cache.outputs.cache-hit != 'true'
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        env:
          ANDROID_EMULATOR_MEM_MB: 4096
          ANDROID_EMULATOR_CPU_CORES: 3
        with:
          action: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
          pre_retry_command: 'echo "Retrying AVD snapshot generation..."'
          attempt_limit: 3
          attempt_delay: 60000
          with: |
            # No -no-snapshot-save here, so the emulator saves a snapshot on
            # quit; actions/cache then stores it for the next run. RAM/CPU
            # must match the test step below, otherwise snapshot load fails.
            api-level: ${{ inputs.android_api_device }}
            cmake: ${{ needs.Build.outputs.cmake_version }}
            # API 26 (8.0) google_apis ships the Nexus Launcher + Google Play Services,
            # whose constant churn on the 2-core software emulator keeps stealing window
            # focus from the test activity (RootViewWithoutFocusException). The app needs no
            # Play features, so use the AOSP `default` image (no GApps, lightweight launcher)
            # on API 26. API 25 stays on google_apis (already green).
            target: ${{ inputs.android_api_device == 26 && 'default' || 'google_apis' }}
            arch: ${{ env.android_emulator_arch }}
            disable-animations: false
            channel: stable
            emulator-options: -no-metrics -no-window -accel ${{ env.EMULATOR_ACCEL }} -cores ${{ env.ANDROID_EMULATOR_CPU_CORES }} -memory ${{ env.ANDROID_EMULATOR_MEM_MB }} -cache-size 512 -partition-size ${{ env.ANDROID_EMULATOR_MEM_MB }} -ranchu -fixed-scale -skip-adb-auth -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none -camera-front none -netfast -no-sim -no-passive-gps -no-location-ui -no-hidpi-scaling -no-mouse-reposition -no-nested-warnings -verbose
            cores: ${{ env.ANDROID_EMULATOR_CPU_CORES }}
            ram-size: ${{ env.ANDROID_EMULATOR_MEM_MB }}M
            heap-size: 1024M
            disk-size: 8192M
            sdcard-path-or-size: 2048M
            avd-name: Android_Emulator_API_${{ inputs.android_api_device }}
            force-avd-creation: false
            disable-linux-hw-accel: auto
            enable-hw-keyboard: false
            emulator-boot-timeout: ${{ env.EMULATOR_BOOT_TIMEOUT }}
            script: echo "Generated AVD snapshot for caching."

      - name: Run Android tests
        timeout-minutes: ${{ case(startsWith(inputs.target_os, 'ubuntu') && inputs.type == 'release', 20, startsWith(inputs.target_os, 'ubuntu') && inputs.type == 'debug', 40, 50) }}
        if: success() && !startsWith(inputs.target_os, 'windows')
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        env:
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 10
          ANDROID_EMULATOR_MEM_MB: 4096
          # Leave headroom for the host (adb, gradle, log capture). Bumping to
          # all 4 cores caused a severe regression (8m -> 22m on the Repeatable
          # workflow); 2 was ~3x faster. 3 is a middle ground to speed cold boot
          # without fully starving the host. Revert to 2 if the regression returns.
          ANDROID_EMULATOR_CPU_CORES: 3
          ANDROID_KEYSTORE_PASSWORD_DEBUG: ${{ secrets.ANDROID_KEYSTORE_PASSWORD_DEBUG }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD_DEBUG: ${{ secrets.ANDROID_KEY_PASSWORD_DEBUG }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS_DEBUG: ${{ secrets.ANDROID_KEY_ALIAS_DEBUG }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          action: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
          pre_retry_command: 'echo "Retrying Run Android tests step..."'
          attempt_limit: 3
          attempt_delay: 60000
          with: |
            # Check available parameters in: https://github.com/ReactiveCircus/android-emulator-runner/blob/main/action.yml
            # Available CI host machines: https://docs.github.com/en/actions/reference/runners/github-hosted-runners#standard-github-hosted-runners-for-public-repositories
            # Max api level for 32bit is: 30
            # Snapshot flag is API-scoped (see emulator-options below):
            #  - API 26 -> -no-snapshot: COLD boot (no snapshot load/save). The headless
            #    -no-window WindowManager intermittently never grants the app window focus
            #    when restoring the cached snapshot (RootViewWithoutFocusException; proven a
            #    per-boot flake - same snapshot, focus worked one run and failed entirely the
            #    next). A fresh cold boot re-initialises WM from scratch each run, which is
            #    more reliable for focus. Costs ~40-90s boot (vs ~8s restore) - well under
            #    EMULATOR_BOOT_TIMEOUT=300s.
            #  - Other APIs (incl. green API 25) -> -no-snapshot-save: the test step does NOT
            #    dirty the cached snapshot but still LOADS it, giving the ~8s boot on cache
            #    hits. Unchanged behaviour.
            api-level: ${{ inputs.android_api_device }}
            cmake: ${{ needs.Build.outputs.cmake_version }}
            # API 26 (8.0) google_apis ships the Nexus Launcher + Google Play Services,
            # whose constant churn on the 2-core software emulator keeps stealing window
            # focus from the test activity (RootViewWithoutFocusException). The app needs no
            # Play features, so use the AOSP `default` image (no GApps, lightweight launcher)
            # on API 26. API 25 stays on google_apis (already green).
            target: ${{ inputs.android_api_device == 26 && 'default' || 'google_apis' }}
            arch: ${{ env.android_emulator_arch }}
            # Keep false: the action disables animations/spellchecker via an
            # un-timeout-wrapped `adb shell settings put ...` right after boot.
            # On API 21, after snapshot restore, the Settings provider is not
            # fully ready even when boot_completed=1 -- that adb call hangs
            # for >60s (killed by the shim) and fails every wretry attempt.
            # run_tests_android.sh already disables all animation scales itself
            # via callAdbShellCommandUntilSuccess (timeout-wrapped, retried).
            # The spell checker does not affect rendering tests.
            disable-animations: false
            disable-spellchecker: false
            channel: stable
            emulator-options: -no-metrics -no-window -accel ${{ env.EMULATOR_ACCEL }} -cores ${{ env.ANDROID_EMULATOR_CPU_CORES }} -memory ${{ env.ANDROID_EMULATOR_MEM_MB }} -cache-size 512 -partition-size ${{ env.ANDROID_EMULATOR_MEM_MB }} -ranchu -fixed-scale -skip-adb-auth -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none -camera-front none -netfast -no-sim -no-passive-gps -no-location-ui -no-hidpi-scaling -no-mouse-reposition -no-nested-warnings -verbose -no-snapshot-save
            cores: ${{ env.ANDROID_EMULATOR_CPU_CORES }}
            ram-size: ${{ env.ANDROID_EMULATOR_MEM_MB }}M
            heap-size: 1024M
            disk-size: 8192M
            sdcard-path-or-size: 2048M
            avd-name: Android_Emulator_API_${{ inputs.android_api_device }}
            force-avd-creation: false
            disable-linux-hw-accel: auto
            enable-hw-keyboard: false
            emulator-boot-timeout: ${{ env.EMULATOR_BOOT_TIMEOUT }} # See EMULATOR_BOOT_TIMEOUT (~300s): healthy boot is ~15-30s; a wedged one fails fast so wretry retries.
            script: |
              ls -lahp ${{ env.ANDROID_HOME }}/ndk/${{ needs.Build.outputs.ndk_version }};
              echo "${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}" | base64 -d > app/MobileRT.jks;
              ls -lahp release/android/MobileRT_${{ inputs.type }}_min_android_api-${{ inputs.android_api }}.apk;
              sh scripts/run_tests_android.sh -t ${{ inputs.type }} -r all -a ${{ inputs.android_api }} -k false -f ${{ env.android_arch }};
              rm app/MobileRT.jks;

      - name: Print error logs
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: failure()
        run: |
          ls -lahp .;
          ls -lahp app/build/reports/tombstones;
          echo 'Print Android tombstone logs:';
          set +e;
          cat app/build/reports/tombstones/*;
          echo 'Print JVM errors if provided by Kernel, and just check the logs from the last line of the previous call:';
          sudo dmesg -T;
          echo 'Print native JVM stacktrace if possible:';
          cat hs_err_pid*.log;
          set -e;

      - name: Upload problems reports as artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: failure()
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          # Retry to survive transient ENOTFOUND/DNS blips reaching the GitHub
          # artifact backend ("Failed to CreateArtifact: Unable to make
          # request: ENOTFOUND"). upload-artifact is a plain JS action, so it
          # is wrappable by wretry (unlike composite actions).
          action: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/actions/upload-artifact/blob/main/action.yml
            name: problems-report
            path: |
              build/reports
              app/build/reports
            if-no-files-found: error
            retention-days: 90
            overwrite: true
            include-hidden-files: true

      - name: Publish Android Test Report
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: ${{ !cancelled() }} # Always run even if the previous step fails
        uses: mikepenz/action-junit-report@74626db7353a25a20a72816467ebf035f674c5f8 # v6.2.0
        with:
          # Check available parameters in: https://github.com/mikepenz/action-junit-report/blob/main/action.yml
          report_paths: '**/build/**/androidTest-results/**/TEST-*.xml'
          annotate_only: false
          check_annotations: true
          update_check: false # Possible bug: https://github.com/mikepenz/action-junit-report/issues/927
          check_name: 'Android Test Report - API ${{ inputs.android_api }} d${{ inputs.android_api_device }} ${{ inputs.type }} (${{ inputs.build_os }}_${{ inputs.target_os }})'
          fail_on_failure: true
          fail_on_parse_error: true
          require_tests: true
          require_passed_tests: true
          include_passed: true
          check_retries: true
          job_summary: true
          detailed_summary: true
          flaky_summary: true
          verbose_summary: true
          skip_success_summary: false
          include_empty_in_summary: true
          include_time_in_summary: true
          simplified_summary: false
          comment: false
          updateComment: true
          annotate_notice: true
          follow_symlink: true
          skip_annotations: false
          truncate_stack_traces: false
          resolve_ignore_classname: false
          skip_comment_without_tests: false

      # codecov/codecov-action is a COMPOSITE action, so it cannot be wrapped by
      # Wandalen/wretry.action (which only retries node/docker actions - it errors
      # 'Runner "composite" does not implemented'). Codecov's CLI wrapper fetches
      # Codecov's GPG public key from an external endpoint to verify the uploader
      # binary, and that fetch intermittently times out ("no valid OpenPGP data
      # found" -> "Can't check signature: No public key"), hard-failing the job
      # via fail_ci_if_error (cf. CI run 26179498206). Retry with the native
      # continue-on-error + conditional re-run idiom: each attempt records its
      # real result in steps.<id>.outcome (continue-on-error keeps the job alive
      # and flips conclusion to success, but outcome still reports the failure),
      # and the next attempt runs only when the previous outcome was 'failure'.
      # The final attempt omits continue-on-error so an exhausted-retry failure
      # still fails the job. No explicit delay is needed: a hung key fetch already
      # burns ~60s before failing, which spaces the retries.
      - name: Upload Android Test results to Codecov (attempt 1/3)
        id: cc_android_test_1
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        continue-on-error: true
        if: ${{ !cancelled() }} # Always run even if the previous step fails
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        # The 3 attempts share an identical `with:` - anchor it here (&...) and
        # alias it (*...) in the retry attempts below so the inputs live once.
        with: &cc_android_test_with
          # Check available parameters in: https://github.com/codecov/codecov-action/blob/main/action.yml
          codecov_yml_path: codecov.yml
          report_type: test_results
          directory: app/build/outputs/androidTest-results
          disable_search: false
          fail_ci_if_error: true
          flags: Android-Instrumentation-Tests
          name: Android-instrumentation-test-results
          version: latest
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          working-directory: .

      - name: Upload Android Test results to Codecov (attempt 2/3)
        id: cc_android_test_2
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        continue-on-error: true
        if: ${{ !cancelled() && steps.cc_android_test_1.outcome == 'failure' }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with: *cc_android_test_with

      - name: Upload Android Test results to Codecov (attempt 3/3)
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: ${{ !cancelled() && steps.cc_android_test_1.outcome == 'failure' && steps.cc_android_test_2.outcome == 'failure' }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with: *cc_android_test_with

      - name: Check report's paths
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success() && inputs.type == 'debug'
        run: |
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && checkPathExists app/build/reports/jacoco/jacocoTestReport jacocoTestReport.xml;

      # Sonar runs LAST (~30+ min later). The per-run compiled_*/reports_*
      # actions/cache entries it needs are routinely LRU-evicted before then
      # because the repo sits at the 10 GB Actions cache cap. Artifacts use a
      # SEPARATE store that is NOT subject to that LRU, so additionally hand
      # the exact inputs Sonar needs (compiled classes + jacoco coverage +
      # native build + wrapper) to it as an artifact. Sonar still hard-fails
      # if this is missing, so it remains a required gate.
      - name: Upload Sonar inputs as artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success() && inputs.type == 'debug'
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          # Retry to survive transient ENOTFOUND/DNS blips reaching the GitHub
          # artifact backend ("Failed to CreateArtifact: Unable to make
          # request: ENOTFOUND"). upload-artifact is a plain JS action, so it
          # is wrappable by wretry (unlike composite actions).
          action: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/actions/upload-artifact/blob/main/action.yml
            name: sonar-inputs_${{ github.sha }}_${{ github.run_id }}_a${{ inputs.android_api }}_d${{ inputs.android_api_device }}_${{ inputs.type }}_${{ inputs.build_os }}_${{ inputs.target_os }}
            # The 'wrapper' Gradle task (build.gradle) regenerates the WHOLE wrapper
            # set per Android API (8.7 for API < 16, else 9.5.1): gradlew, gradlew.bat,
            # the jar and the properties. Shipping only gradle/wrapper leaves the
            # downstream Sonar job with the regenerated 8.7 jar (whose manifest has no
            # Main-Class) paired with the committed 9.5.1 gradlew (which runs `java -jar`),
            # so `sh gradlew` fails with "no main manifest attribute". Ship the matching
            # gradlew scripts too so the wrapper set stays self-consistent downstream.
            path: |
              app/build
              app/.cxx
              gradle/wrapper
              gradlew
              gradlew.bat
            if-no-files-found: error
            # Ephemeral intra-run handoff (consumed by the Sonar job in the same
            # run, never needed afterwards). Keep retention at the 1-day minimum
            # so these large artifacts do not pile up in storage.
            retention-days: 1
            overwrite: true
            include-hidden-files: true

      - name: Upload test screenshots as artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          # Retry to survive transient ENOTFOUND/DNS blips reaching the GitHub
          # artifact backend ("Failed to CreateArtifact: Unable to make
          # request: ENOTFOUND"). upload-artifact is a plain JS action, so it
          # is wrappable by wretry (unlike composite actions).
          action: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/actions/upload-artifact/blob/main/action.yml
            name: MobileRT_${{ inputs.type }}_android_api-a${{ inputs.android_api }}_d${{ inputs.android_api_device }}_test_screenshots
            path: screenshots
            if-no-files-found: warn
            retention-days: 90
            overwrite: true
            include-hidden-files: true


  UnitTests:
    needs: [Build]
    runs-on: ${{ inputs.target_os }}
    timeout-minutes: 360
    name: Unit tests ${{ inputs.android_api }} ${{ inputs.type }} ${{ inputs.build_os }} (${{ inputs.target_os }})

    # Sets permissions of the GITHUB_TOKEN to allow publish test results
    permissions:
      checks: write
      pull-requests: write # only required if `comment: true` was enabled

    steps:
      - name: Checkout
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Check available parameters in: https://github.com/actions/checkout/blob/main/action.yml
          lfs: true

      - name: Add custom environment variables
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_LONG) }}
        if: success()
        run: |
          if [ -n "${ANDROID_HOME}" ]; then
            echo 'Available Android versions:';
            ls -lahp ${ANDROID_HOME}/ndk;
            ls -lahp ${ANDROID_HOME}/cmake || true;
            ls -lahp ${ANDROID_HOME}/build-tools;
            ls -lahp ${ANDROID_HOME}/platforms;
            ls -lahp ${ANDROID_HOME}/extras;
            ls -lahp ${ANDROID_HOME};
          fi
          GRADLE_PATH="${HOME}/.gradle";
          echo "GRADLE_PATH=${GRADLE_PATH}" >> "${GITHUB_ENV}";
          mkdir -p "${GRADLE_PATH}";

      # Useful step to avoid gradle having to download Gradle dependencies
      # Taken from: https://github.com/marketplace/actions/download-workflow-artifact
      - name: Download Gradle packages artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          action: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
          pre_retry_command: 'echo "Retrying Download Gradle packages artifact step..."'
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/dawidd6/action-download-artifact/blob/master/action.yml
            # Optional, GitHub token, a Personal Access Token with `public_repo` scope if needed
            # Required, if the artifact is from a different repo
            # Required, if the repo is private a Personal Access Token with `repo` scope is needed
            github_token: ${{ secrets.GITHUB_TOKEN }}
            # Optional, workflow file name or ID
            # If not specified, will be inferred from run_id (if run_id is specified), or will be the current workflow
            workflow: android.yml
            # Optional, the status or conclusion of a completed workflow to search for
            # Can be one of a workflow conclusion:
            #   "failure", "success", "neutral", "cancelled", "skipped", "timed_out", "action_required"
            # Or a workflow status:
            #   "completed", "in_progress", "queued"
            workflow_conclusion: ''
            # Optional, will get head commit SHA
            pr: ${{ github.event.pull_request.number }}
            # Optional, no need to specify if PR is
            commit: ${{ github.event.pull_request.head.sha }}
            # Optional, will use the branch
            # branch: master
            # Optional, defaults to all types
            # event: push
            # Optional, will use specified workflow run
            # Pin to THIS run so the same-run artifact is read by run_id directly,
            # not via the flaky cross-run search that paginates GitHub's artifact
            # API and transiently misses it (cf. CI run 26244860134: only the API
            # 15 Unit tests job missed, hard-failing via if_no_artifact_found: fail).
            run_id: ${{ github.run_id }}
            # Optional, run number from the workflow
            # run_number: 34
            # Optional, uploaded artifact name,
            # will download all artifacts if not specified
            # and extract them into respective subdirectories
            # https://github.com/actions/download-artifact#download-all-artifacts
            name: gradle-packages_${{ github.sha }}_${{ github.run_id }}
            # Optional, a directory where to extract artifact(s), defaults to the current directory
            path: ${{ env.GRADLE_PATH }}
            # Optional, defaults to current repo
            repo: ${{ github.repository }}
            allow_forks: true
            # Optional, check the workflow run to whether it has an artifact
            # then will get the last available artifact from the previous workflow
            # default false, just try to download from the last one
            check_artifacts:  true
            # Optional, search for the last workflow run whose stored an artifact named as in `name` input
            # default false
            search_artifacts: true
            # Optional, choose to skip unpacking the downloaded artifact(s)
            # default false
            skip_unpack: true
            # Optional, choose how to exit the action if no artifact is found
            # can be one of:
            #  "fail", "warn", "ignore"
            # default fail
            if_no_artifact_found: fail

      - name: Extract and check files from gradle artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        run: |
          ls -lahp ${{ env.GRADLE_PATH }};
          # dawidd6 (skip_unpack) saves the artifact as <artifact-name>.zip.
          # The artifact name is now commit/run keyed, so normalise the
          # downloaded file back to the fixed name the extract logic expects.
          mv "${{ env.GRADLE_PATH }}"/gradle-packages_*.zip "${{ env.GRADLE_PATH }}"/gradle-packages.zip 2> /dev/null || true;
          ls -lahp ${{ env.GRADLE_PATH }}/gradle-packages.zip;
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && extractFilesFromArtifact ${{ env.GRADLE_PATH }};

      - name: Set up JDK
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          # Check available parameters in: https://github.com/actions/setup-java/blob/main/action.yml
          java-version: 21
          distribution: zulu
          java-package: jdk
          check-latest: false
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          settings-path: ~/.gradle
          overwrite-settings: true
          gpg-private-key: ''
          gpg-passphrase: GPG_PASSPHRASE
          cache-dependency-path: '**/build.gradle'

      - name: Install Android SDK
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        run: |
          # UnitTests is a JVM job (no emulator) but Gradle still requires
          # ANDROID_HOME to point at a valid SDK to evaluate the Android plugin
          # ("SDK location not found"). Portable across Linux, macOS and Windows;
          # a no-op on images that pre-install the SDK. See installAndroidSdk for
          # per-OS archive + Linux ARM multiarch handling.
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && installAndroidSdk "${{ inputs.android_api }}";

      - name: Install dependencies
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_LONG) }}
        if: success()
        run: |
          sh scripts/install_dependencies.sh;
          echo 'Add binutils to PATH for readelf command in MacOS.';
          echo "/usr/local/opt/binutils/bin" >> ${GITHUB_PATH};
          echo "/opt/homebrew/opt/binutils/bin" >> ${GITHUB_PATH};

      # Restore the compiled binaries from the artifact uploaded by the Build
      # job (not actions/cache: per-run caches are LRU-evicted under the 10 GB
      # cap before this job runs). The Gradle build-cache is restored
      # separately from the gradle-packages artifact. if_no_artifact_found:
      # fail keeps this a hard dependency - the job fails if it is missing.
      - name: Download generated binaries artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          action: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
          pre_retry_command: 'echo "Retrying Download generated binaries artifact step..."'
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/dawidd6/action-download-artifact/blob/master/action.yml
            github_token: ${{ secrets.GITHUB_TOKEN }}
            workflow: android.yml
            workflow_conclusion: ''
            pr: ${{ github.event.pull_request.number }}
            commit: ${{ github.event.pull_request.head.sha }}
            name: compiled_${{ github.sha }}_${{ github.run_id }}_a${{ inputs.android_api }}_d${{ inputs.android_api_device }}_${{ inputs.type }}_${{ inputs.build_os }}_${{ inputs.target_os }}
            path: .
            repo: ${{ github.repository }}
            allow_forks: true
            check_artifacts: true
            search_artifacts: true
            if_no_artifact_found: fail

      - name: Check binaries' paths
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          find app/build/ -iname "*.class";
          # shellcheck disable=SC1091
          . scripts/helper_functions.sh && checkPathExists app/build;
          . scripts/helper_functions.sh && checkPathExists app/build/intermediates;
          . scripts/helper_functions.sh && checkPathExists app/build/intermediates/javac;
          if [ "${{ inputs.type }}" = 'debug' ]; then
            . scripts/helper_functions.sh && checkPathExists app/build/intermediates/javac/debug;
          fi
          . scripts/helper_functions.sh && checkPathExists app/.cxx;
          . scripts/helper_functions.sh && checkPathExists app/third_party;
          . scripts/helper_functions.sh && checkPathExists ${{ env.GRADLE_PATH }};
          if [ "${{ inputs.android_api }}" -gt 15 ]; then
            typeWithCapitalLetter=$(. scripts/helper_functions.sh && capitalizeFirstletter ${{ inputs.type }});
            . scripts/helper_functions.sh && checkPathExists app/build/intermediates/javac/${{ inputs.type }}/compile${typeWithCapitalLetter}JavaWithJavac/classes;
            # . scripts/helper_functions.sh && checkPathExists app/build/intermediates/built_in_kotlinc/${{ inputs.type }}/compile${typeWithCapitalLetter}Kotlin/classes;
          else
            if [ "${{ inputs.type }}" = 'debug' ]; then
              . scripts/helper_functions.sh && checkPathExists app/build/tmp/kotlin-classes/debug;
            fi
          fi

      - name: Set Android CPU Architecture
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          echo 'android_arch=\"armeabi-v7a\",\"arm64-v8a\",\"x86\",\"x86_64\"' >> "${GITHUB_ENV}";

      - name: Download Android dependencies
        timeout-minutes: 8
        if: success()
        run: |
          . scripts/helper_functions.sh && callCommandUntilSuccess 5 timeout 180 sh gradlew test"${{ inputs.type }}"UnitTest lint --dry-run -Dorg.gradle.configuration-cache=false --parallel \
            -DtestType="${{ inputs.type }}" -DandroidApiVersion="${{ inputs.android_api }}" -DabiFilters="[${{ env.android_arch }}]" \
            --info --warning-mode all --stacktrace;

      - name: Run unit tests Java
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        run: |
          echo "android_arch: ${{ env.android_arch }}";
          sh scripts/run_tests.sh -t ${{ inputs.type }} -a ${{ inputs.android_api }} -f ${{ env.android_arch }};

      - name: Print error logs
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: failure()
        run: |
          ls -lahp .;
          set +e;
          echo 'Print JVM errors if provided by Kernel, and just check the logs from the last line of the previous call:';
          sudo dmesg -T;
          echo 'Print native JVM stacktrace if possible:';
          cat hs_err_pid*.log;
          set -e;

      - name: Upload problems reports as artifact
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: failure()
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        with:
          # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
          # Retry to survive transient ENOTFOUND/DNS blips reaching the GitHub
          # artifact backend ("Failed to CreateArtifact: Unable to make
          # request: ENOTFOUND"). upload-artifact is a plain JS action, so it
          # is wrappable by wretry (unlike composite actions).
          action: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            # Check available parameters in: https://github.com/actions/upload-artifact/blob/main/action.yml
            name: problems-report
            path: |
              build/reports
              app/build/reports
            if-no-files-found: error
            retention-days: 90
            overwrite: true
            include-hidden-files: true

      - name: Run linter
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
        if: success()
        run: |
          sh scripts/check_android.sh -a ${{ inputs.android_api }} -f ${{ env.android_arch }};

      - name: Publish Unit Test Report
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: ${{ !cancelled() }} # Always run even if the previous step fails
        uses: mikepenz/action-junit-report@74626db7353a25a20a72816467ebf035f674c5f8 # v6.2.0
        with:
          # Check available parameters in: https://github.com/mikepenz/action-junit-report/blob/main/action.yml
          report_paths: '**/build/**/test-results/**/TEST-*.xml'
          annotate_only: false
          check_annotations: true
          update_check: false # Possible bug: https://github.com/mikepenz/action-junit-report/issues/927
          check_name: 'Unit Test Report - API ${{ inputs.android_api }} ${{ inputs.type }} (${{ inputs.build_os }}_${{ inputs.target_os }})'
          fail_on_failure: true
          fail_on_parse_error: true
          require_tests: true
          require_passed_tests: true
          include_passed: true
          check_retries: true
          job_summary: true
          detailed_summary: true
          flaky_summary: true
          verbose_summary: true
          skip_success_summary: false
          include_empty_in_summary: true
          include_time_in_summary: true
          simplified_summary: false
          comment: false
          updateComment: true
          annotate_notice: true
          follow_symlink: true
          skip_annotations: false
          truncate_stack_traces: false
          resolve_ignore_classname: false
          skip_comment_without_tests: false

      # See "Upload Android Test results to Codecov" above for why this is a
      # native continue-on-error + conditional re-run retry instead of wretry
      # (codecov-action is composite; transient Codecov GPG-key-fetch failures).
      - name: Upload Unit Test results to Codecov (attempt 1/3)
        id: cc_android_unit_1
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        continue-on-error: true
        if: ${{ !cancelled() }} # Always run even if the previous step fails
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        # The 3 attempts share an identical `with:` - anchor it here (&...) and
        # alias it (*...) in the retry attempts below so the inputs live once.
        with: &cc_android_unit_with
          # Check available parameters in: https://github.com/codecov/codecov-action/blob/main/action.yml
          codecov_yml_path: codecov.yml
          report_type: test_results
          directory: app/build/test-results
          disable_search: false
          fail_ci_if_error: true
          flags: Android-Unit-Tests
          name: Android-unit-test-results
          version: latest
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          working-directory: .

      - name: Upload Unit Test results to Codecov (attempt 2/3)
        id: cc_android_unit_2
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        continue-on-error: true
        if: ${{ !cancelled() && steps.cc_android_unit_1.outcome == 'failure' }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with: *cc_android_unit_with

      - name: Upload Unit Test results to Codecov (attempt 3/3)
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: ${{ !cancelled() && steps.cc_android_unit_1.outcome == 'failure' && steps.cc_android_unit_2.outcome == 'failure' }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with: *cc_android_unit_with

  Sonar:
    needs: [AndroidTests]
    if: inputs.type == 'debug'
    name: Code Coverage & Sonar ${{ inputs.type }} (${{ inputs.build_os }}_${{ inputs.target_os }})
