name: Repeatable

on:
  workflow_dispatch:
  push:
    branches:
    - '**'
    tags-ignore:
    - '**'
    paths-ignore:
    - '*'
    - '**/**'
    - '!.github/workflows/android_repeatable.yml'
    - '!.github/workflows/android_repeatable-matrix.json'

permissions: {}

defaults:
  run:
    shell: sh
    working-directory: .

concurrency:
  group: ${{ github.workflow }} ${{ github.ref }}
  cancel-in-progress: true

# Default environment variables.
env:
  GITHUB_STEP_TIMEOUT_SMALL: 4
  GITHUB_STEP_TIMEOUT_MEDIUM: 10
  GITHUB_STEP_TIMEOUT_LONG: 20
  # Workflow-level (not per-step): the AVD cache key references these, so a step-level env
  # would expand to 'cores_-mem_-' and reuse a stale snapshot. 3 cores (leave 2 for the host)
  # measured ~3x faster than 4 (4 regressed 8m -> 22m on the Repeatable workflow).
  ANDROID_EMULATOR_CPU_CORES: 3
  ANDROID_EMULATOR_MEM_MB: 6144
  # Run wretry.action JS on Node 24 before GitHub forces it on 2026-06-16 (surfaces breakage early).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Matrix:
    name: Set Matrix
    runs-on: macos-latest
    timeout-minutes: 2

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Check available parameters in: https://github.com/actions/checkout/blob/main/action.yml
          lfs: true

      - name: Set Matrix
        id: set-matrix
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        run: |
          MATRIX=$(echo $(cat .github/workflows/android_repeatable-matrix.json) | sed 's/ //g');
          echo "Matrix: ${MATRIX}";
          echo "matrix=${MATRIX}" >> ${GITHUB_OUTPUT};


  Build:
    needs: [Matrix]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.Matrix.outputs.matrix) }}

    name: ${{ matrix.test }} Android ${{ matrix.android_api }} [${{ matrix.type }} (${{ matrix.host_os }})]
    runs-on: ${{ matrix.host_os }}
    timeout-minutes: 360

    steps:
    - name: Checkout
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
      if: success()
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      with:
        # Check available parameters in: https://github.com/actions/checkout/blob/main/action.yml
        lfs: true

    - name: Set up JDK
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
      if: success()
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        # Check available parameters in: https://github.com/actions/setup-java/blob/main/action.yml
        java-version: 21
        distribution: temurin
        java-package: jdk
        check-latest: false
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN
        settings-path: ~/.gradle
        overwrite-settings: true
        gpg-private-key: ''
        gpg-passphrase: GPG_PASSPHRASE
        cache-dependency-path: '**/build.gradle'

    - name: Install dependencies
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_LONG) }}
      if: success()
      run: |
        sh scripts/install_dependencies.sh;
        echo 'Add binutils to PATH for readelf command in MacOS.';
        echo "/usr/local/opt/binutils/bin" >> ${GITHUB_PATH};
        echo "/opt/homebrew/opt/binutils/bin" >> ${GITHUB_PATH};

    - name: Add custom environment variables
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success()
      run: |
        if [ -n "${ANDROID_HOME}" ]; then
          echo "ANDROID_HOME=${ANDROID_HOME}" >> "${GITHUB_ENV}";
        fi
        df -Pk -h ${HOME};
        env;

    - name: Set Android NDK version
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success()
      run: |
        if [ "${{ matrix.android_api }}" -ge 21 ]; then
          echo "NDK_VERSION=29.0.14206865" >> "${GITHUB_ENV}";
        elif [ "${{ matrix.android_api }}" -ge 19 ]; then
          echo "NDK_VERSION=25.2.9519653" >> "${GITHUB_ENV}";
        else
          echo "NDK_VERSION=23.2.8568313" >> "${GITHUB_ENV}";
        fi
        echo "ANDROID_CMAKE_VERSION=4.0.2" >> "${GITHUB_ENV}";

    - name: Delete unnecessary Android SDK components
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_MEDIUM) }}
      if: success()
      run: |
        if [ -n "${ANDROID_HOME}" ]; then
          echo 'Available Android versions:';
          ls -lahp ${ANDROID_HOME};
          rm -rf ${ANDROID_HOME}/ndk;
          rm -rf ${ANDROID_HOME}/extras;
          rm -rf ${ANDROID_HOME}/cmake;
          mkdir -p ${ANDROID_HOME}/ndk;
          mkdir -p ${ANDROID_HOME}/extras;
          mkdir -p ${ANDROID_HOME}/cmake;
          ls -lahp ${ANDROID_HOME}/ndk;
          ls -lahp ${ANDROID_HOME}/cmake;
          ls -lahp ${ANDROID_HOME}/build-tools;
          ls -lahp ${ANDROID_HOME}/platforms;
          ls -lahp ${ANDROID_HOME}/extras;
        fi

    - name: Cache Android CMake
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success()
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: ${{ env.ANDROID_HOME }}/cmake/${{ env.ANDROID_CMAKE_VERSION }}
        key: android-cmake-${{ env.ANDROID_CMAKE_VERSION }}-${{ runner.os }}

    - name: Cache Android NDK
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success()
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        key: android-ndk-${{ env.NDK_VERSION }}-${{ runner.os }}

    - name: Set Android CPU Architecture
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success()
      run: |
        cpuArch=$(uname -m);
        if [ "${cpuArch}" = 'arm64' ]; then
          if [ "${{ matrix.android_api }}" -gt 20 ]; then
            echo 'android_arch=\"arm64-v8a\"' >> "${GITHUB_ENV}";
            echo 'android_emulator_arch=arm64-v8a' >> "${GITHUB_ENV}";
          else
            echo 'android_arch=\"armeabi-v7a\"' >> "${GITHUB_ENV}";
            echo 'android_emulator_arch=arm64-v8a' >> "${GITHUB_ENV}";
          fi
        else
          if [ "${{ matrix.android_api }}" -gt 20 ] && [ "${{ matrix.android_api }}" -ne 24 ] && [ "${{ matrix.android_api }}" -ne 25 ] && [ "${{ matrix.android_api }}" -ne 27 ]; then
            echo 'android_arch=\"x86_64\"' >> "${GITHUB_ENV}";
            echo 'android_emulator_arch=x86_64' >> "${GITHUB_ENV}";
          else
            echo 'android_arch=\"x86\"' >> "${GITHUB_ENV}";
            echo 'android_emulator_arch=x86' >> "${GITHUB_ENV}";
          fi
        fi
        set -u;
        . scripts/helper_functions.sh && parallelizeBuild && echo "NCPU_CORES=${NCPU_CORES}" >> "${GITHUB_ENV}";

    - name: Download Android CMake
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success() && !startsWith(matrix.host_os, 'windows') && !endsWith(matrix.host_os, '-arm')
      run: |
        . scripts/helper_functions.sh && callCommandUntilSuccess 2 timeout 180 ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install 'cmake;${{ env.ANDROID_CMAKE_VERSION }}';

    - name: Download Android CMake Windows
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success() && startsWith(matrix.host_os, 'windows')
      run: |
        . scripts/helper_functions.sh && callCommandUntilSuccess 2 timeout 180 ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager.bat --install 'cmake;${{ env.ANDROID_CMAKE_VERSION }}';

    - name: Download NDK
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success() && !startsWith(matrix.host_os, 'windows')
      run: |
        . scripts/helper_functions.sh && callCommandUntilSuccess 2 timeout 180 ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.NDK_VERSION }}";

    - name: Download NDK Windows
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success() && startsWith(matrix.host_os, 'windows')
      run: |
        . scripts/helper_functions.sh && callCommandUntilSuccess 2 timeout 180 ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager.bat --install "ndk;${{ env.NDK_VERSION }}";

    - name: Download Android dependencies
      timeout-minutes: 8
      if: success()
      run: |
        . scripts/helper_functions.sh && callCommandUntilSuccess 5 timeout 180 sh gradlew build --dry-run -Dorg.gradle.configuration-cache=true --parallel \
          -DtestType="${{ matrix.type }}" -DandroidApiVersion="${{ matrix.android_api }}" -DabiFilters="[${{ env.android_arch }}]" \
          --info --warning-mode all --stacktrace;

    - name: Build ${{ matrix.type }}
      timeout-minutes: 30
      if: success()
      env:
        ANDROID_KEYSTORE_PASSWORD_DEBUG: ${{ secrets.ANDROID_KEYSTORE_PASSWORD_DEBUG }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_PASSWORD_DEBUG: ${{ secrets.ANDROID_KEY_PASSWORD_DEBUG }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        ANDROID_KEY_ALIAS_DEBUG: ${{ secrets.ANDROID_KEY_ALIAS_DEBUG }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      run: |
        echo "${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}" | base64 -d > app/MobileRT.jks;
        sh scripts/compile_android.sh -t ${{ matrix.type }} -a ${{ matrix.android_api }} -r yes -f ${{ env.android_arch }};
        rm app/MobileRT.jks;

    - name: Enable KVM group permissions
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success() && startsWith(matrix.host_os, 'ubuntu')
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules;
        sudo udevadm control --reload-rules;
        sudo udevadm trigger --name-match=kvm;

    - name: Download Android dependencies
      timeout-minutes: 8
      if: success()
      run: |
        . scripts/helper_functions.sh && callCommandUntilSuccess 5 timeout 180 sh gradlew connectedAndroidTest --dry-run -Dorg.gradle.configuration-cache=true --parallel \
          -DtestType="${{ matrix.type }}" -DandroidApiVersion="${{ matrix.android_api }}" -DabiFilters="[${{ env.android_arch }}]" \
          --info --warning-mode all --stacktrace;

    - name: Set emulator boot timeout
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success()
      run: |
        # Right-sized to observed reality: a healthy emulator boot on these
        # runners completes in ~15-30s (logs across APIs). The old 240/400s
        # values were ~8-25x over-provisioned, so when an emulator wedged the
        # android-emulator-runner step idled the full boot-timeout before
        # failing - even after the adb timeout-shim had already detected and
        # killed the wedged emulator (~90s). 180s keeps >5x headroom over a
        # healthy boot yet lets a wedged attempt fail fast so wretry retries
        # on a fresh emulator promptly instead of burning the 20-min cap.
        echo "EMULATOR_BOOT_TIMEOUT=300" >> "${GITHUB_ENV}";

    - name: AVD cache
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success() && !startsWith(matrix.host_os, 'windows')
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      id: avd-cache
      with:
        # Caches the AVD definition + the post-boot snapshot. On hit, the
        # emulator-runner skips both AVD creation (~30s) and cold boot
        # (~3-5 min), starting from the snapshot in ~30-60s. Bump the
        # trailing version suffix to invalidate stale snapshots.
        # The system-image `target` (default) is part of the key: the cached
        # AVD's config.ini hardcodes the tag chosen at creation, so a target
        # change must rotate the cache - otherwise a stale AVD is restored
        # against a freshly-installed image and the emulator dies on
        # "Broken AVD system path". All APIs use the AOSP `default` image (see
        # the `target:` inputs below).
        path: |
          ~/.android/avd/*
          ~/.android/adb*
        key: avd-os_${{ runner.os }}-api_${{ matrix.android_api }}-arch_${{ env.android_emulator_arch }}-cores_${{ env.ANDROID_EMULATOR_CPU_CORES }}-mem_${{ env.ANDROID_EMULATOR_MEM_MB }}-img_default

    - name: Install adb timeout-shim
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success() && !startsWith(inputs.target_os, 'windows')
      run: |
        set -eu
        # ReactiveCircus/android-emulator-runner's wait-for-boot loop runs
        # `adb -s emulator-<id> shell getprop sys.boot_completed` with NO
        # per-call timeout. When the guest adbd wedges while the emulator
        # process is still alive, that adb call blocks forever; the action's
        # emulator-boot-timeout never fires (it is only checked between
        # iterations) and wretry never retries (a hang is not a failure), so
        # the whole step burns until GitHub's SIGINT (~20 min), killing
        # every wretry attempt with it.
        #
        # The same hang affects post-boot adb calls the action makes
        # itself - e.g. `adb -s emulator-<id> shell input keyevent 82` to
        # unlock the device, which has been observed to idle the full 300s
        # before the action terminates and wretry retries.
        #
        # The action invokes adb by ABSOLUTE path, so a PATH shim cannot
        # intercept it; replace the binary in place with a wrapper that
        # tiers adb calls by source:
        #   * boot poll (`getprop sys.boot_completed`): 45s bound AND,
        #     on 2 consecutive timeouts (~90s), actively kill the wedged
        #     emulator so the step fails right away and wretry retries on
        #     a FRESH emulator (which boots in ~15-30s);
        #   * any other call carrying `-s emulator-<id>` (the action's
        #     marker - scripts in this repo never use it): 60s bound, so
        #     a wedged post-boot setup call fails the attempt fast;
        #   * everything else (the repo's own script calls, which already
        #     wrap adb in `timeout 300`): keep the generous 300s bound, so
        #     legitimate long pm install/pull operations are not killed.
        PT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}/platform-tools"
        if [ ! -x "${PT}/adb.real" ]; then
          mv "${PT}/adb" "${PT}/adb.real"
        fi
        cat > "${PT}/adb" <<EOF
        #!/usr/bin/env sh
        # adb timeout-shim - see the "Install adb timeout-shim" workflow step.
        ADB_REAL="${PT}/adb.real"
        case " \$* " in
          *" getprop sys.boot_completed"*)
            # Detect a wedged-but-alive emulator fast and force a retry.
            HANG_STATE=/tmp/adb-shim-boot-hangs
            timeout -k 5s -s TERM 45s "\$ADB_REAL" "\$@"
            rc=\$?
            if [ "\$rc" -eq 124 ] || [ "\$rc" -eq 137 ]; then
              n=\$(( \$(cat "\$HANG_STATE" 2>/dev/null || echo 0) + 1 ))
              echo "\$n" > "\$HANG_STATE"
              if [ "\$n" -ge 2 ]; then
                echo "adb timeout-shim: boot poll hung \${n}x consecutively; emulator is wedged - killing it so the test step fails fast and wretry retries on a fresh emulator." >&2
                "\$ADB_REAL" emu kill >/dev/null 2>&1 || true
                pkill -9 -f qemu-system >/dev/null 2>&1 || true
                rm -f "\$HANG_STATE"
              fi
            else
              rm -f "\$HANG_STATE"
            fi
            exit "\$rc" ;;
          *" -s emulator-"*)
            # Any other action-level adb call (e.g. the post-boot
            # 'input keyevent 82' device unlock) can also hang on a
            # wedged-but-alive emulator. The scripts in this repo never
            # use '-s emulator-<id>', so that prefix is a precise marker for
            # the action's calls - bound them short (60s) so a hang fails
            # the attempt fast instead of idling the default 300s before
            # the action terminates and wretry retries.
            exec timeout -k 5s -s TERM 60s "\$ADB_REAL" "\$@" ;;
          *)
            exec timeout -k 10s -s TERM 300s "\$ADB_REAL" "\$@" ;;
        esac
        EOF
        chmod +x "${PT}/adb";
        echo "adb timeout-shim installed at ${PT}/adb";
        "${PT}/adb" --version | head -n 1 || true;

    - name: Create AVD and generate snapshot for caching
      timeout-minutes: 20
      if: success() && !startsWith(matrix.host_os, 'windows') && steps.avd-cache.outputs.cache-hit != 'true'
      uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
      with:
        action: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        pre_retry_command: 'echo "Retrying AVD snapshot generation..."'
        attempt_limit: 3
        attempt_delay: 60000
        with: |
          # No -no-snapshot-save here so the emulator saves a snapshot on
          # quit; actions/cache then stores it for the next run. RAM/CPU
          # must match the test step below, otherwise snapshot load fails.
          api-level: ${{ matrix.android_api }}
          # All APIs use the AOSP `default` image (no GApps). The google_apis
          # image ships the Nexus Launcher + Google Play Services, whose churn
          # (a) steals window focus from the test activity on API 26
          # (RootViewWithoutFocusException) and (b) spawns extra system services
          # (printspooler, Play) that multiply short-lived process teardowns -
          # on first-gen ART (API 21/22) that tripped a guest-kernel MM bug
          # (BUG: Bad page state in exit_mmap) -> GCDaemon SIGSEGV storm. The
          # app needs no Play features, so default is lighter and avoids both.
          target: default
          arch: ${{ env.android_emulator_arch }}
          disable-animations: false
          channel: stable
          # -memory is a launch-time QEMU flag: it sets guest RAM even when the
          # cached AVD is reused (force-avd-creation: false), unlike ram-size
          # which only writes hw.ramSize into config.ini and is ignored on a
          # cache hit. The guest was seeing ~328MB despite ram-size 4096M; the
          # explicit -memory raises it (matches reusable-android.yml). Must stay
          # identical to the test step below or snapshot load fails.
          emulator-options: -no-metrics -no-window -cores ${{ env.ANDROID_EMULATOR_CPU_CORES }} -memory ${{ env.ANDROID_EMULATOR_MEM_MB }} -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          cores: ${{ env.ANDROID_EMULATOR_CPU_CORES }}
          ram-size: ${{ env.ANDROID_EMULATOR_MEM_MB }}M
          disk-size: 8192M
          sdcard-path-or-size: 2048M
          avd-name: Android_Emulator_API_${{ matrix.android_api }}
          force-avd-creation: false
          emulator-boot-timeout: ${{ env.EMULATOR_BOOT_TIMEOUT }}
          script: |
            echo "Generated AVD snapshot for caching.";
            # Bounded teardown watchdog. This step omits -no-snapshot-save, so
            # The snapshot save blocks until qemu exits, but under swiftshader the GL threads can
            # fail to terminate so qemu hangs and the step burns the 20min cap. Detached watchdog
            # force-reaps a wedged qemu after 180s. MUST scope the kill to the current qemu PID: a
            # pattern kill (pkill -f qemu-system) outlived this step and murdered the TEST step's
            # fresh emulator (also matched the watchdog's own cmdline). kill -0 = already exited
            # (healthy, no-op) vs still alive (wedged, reap). Single line: each line is its own `sh -c`.
            qemu_pid="$(pgrep -o -f qemu-system || true)"; nohup sh -c 'sleep 180; if [ -n "$1" ] && kill -0 "$1" 2>/dev/null; then echo "Watchdog: qemu (pid $1) wedged after snapshot save; force-reaping."; kill -9 "$1" 2>/dev/null || true; fi' watchdog "${qemu_pid}" >/dev/null 2>&1 &

    - name: Run Android tests
      timeout-minutes: ${{ case(startsWith(matrix.host_os, 'ubuntu') && matrix.type == 'release', 20, startsWith(matrix.host_os, 'ubuntu') && matrix.type == 'debug', 40, 50) }}
      if: success() && !startsWith(matrix.host_os, 'windows')
      uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
      env:
        ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 10
        ANDROID_KEYSTORE_PASSWORD_DEBUG: ${{ secrets.ANDROID_KEYSTORE_PASSWORD_DEBUG }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_PASSWORD_DEBUG: ${{ secrets.ANDROID_KEY_PASSWORD_DEBUG }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        ANDROID_KEY_ALIAS_DEBUG: ${{ secrets.ANDROID_KEY_ALIAS_DEBUG }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      with:
        # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
        action: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        pre_retry_command: 'echo "Retrying Run Android tests step..."'
        attempt_limit: 3
        attempt_delay: 60000
        with: |
          # Check available parameters in: https://github.com/ReactiveCircus/android-emulator-runner/blob/main/action.yml
          # Available CI host machines: https://docs.github.com/en/actions/reference/runners/github-hosted-runners#standard-github-hosted-runners-for-public-repositories
          # Max api level for 32bit is: 30
          api-level: ${{ matrix.android_api }}
          # All APIs use the AOSP `default` image (no GApps). The google_apis
          # image ships the Nexus Launcher + Google Play Services, whose churn
          # (a) steals window focus from the test activity on API 26
          # (RootViewWithoutFocusException) and (b) spawns extra system services
          # (printspooler, Play) that multiply short-lived process teardowns -
          # on first-gen ART (API 21/22) that tripped a guest-kernel MM bug
          # (BUG: Bad page state in exit_mmap) -> GCDaemon SIGSEGV storm. The
          # app needs no Play features, so default is lighter and avoids both.
          target: default
          arch: ${{ env.android_emulator_arch }}
          # Keep false: the action disables animations/spellchecker via an
          # un-timeout-wrapped `adb shell settings put ...` right after boot.
          # On API 21, after snapshot restore, the Settings provider is not
          # fully ready even when boot_completed=1 -- that adb call hangs
          # for >60s (killed by the shim) and fails every wretry attempt.
          # run_tests_android.sh already disables all animation scales itself
          # via callAdbShellCommandUntilSuccess (timeout-wrapped, retried).
          # The spell checker does not affect rendering tests.
          disable-animations: false
          disable-spellchecker: false
          channel: stable
          # -memory must match the snapshot-generation step above (snapshot load
          # fails on a RAM mismatch). See the rationale comment there.
          emulator-options: -no-metrics -no-window -cores ${{ env.ANDROID_EMULATOR_CPU_CORES }} -memory ${{ env.ANDROID_EMULATOR_MEM_MB }} -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none -no-snapshot-save
          cores: ${{ env.ANDROID_EMULATOR_CPU_CORES }}
          ram-size: ${{ env.ANDROID_EMULATOR_MEM_MB }}M
          disk-size: 8192M
          sdcard-path-or-size: 2048M
          avd-name: Android_Emulator_API_${{ matrix.android_api }}
          force-avd-creation: false
          emulator-boot-timeout: ${{ env.EMULATOR_BOOT_TIMEOUT }} # See EMULATOR_BOOT_TIMEOUT (~300s): healthy boot is ~15-30s; a wedged one fails fast so wretry retries.
          script: |
            echo "${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}" | base64 -d > app/MobileRT.jks;
            sh scripts/run_tests_android.sh -t ${{ matrix.type }} -r rep_puscas.mobilertapp.${{ matrix.test }} -a ${{ matrix.android_api }} -k false -f ${{ env.android_arch }};
            rm app/MobileRT.jks;

    - name: Print error logs
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: failure()
      run: |
        ls -lahp .;
        set +e;
        ls -lahp app/build/reports/tombstones;
        echo 'Print Android tombstone logs:';
        cat app/build/reports/tombstones/*;
        echo 'Print Android ART thread dump:';
        cat app/build/reports/trace*;
        echo 'Print device memory snapshot (/proc/meminfo):';
        cat app/build/reports/proc_meminfo_*.log;
        echo 'Print device dumpsys meminfo:';
        cat app/build/reports/dumpsys_meminfo_*.log;
        echo 'Print device kernel ring buffer (dmesg) - lowmemorykiller/oom-killer lines appear here:';
        cat app/build/reports/dmesg_*.log;
        echo 'Print device logcat ring-buffer dump (tail):';
        tail -n 2000 app/build/reports/logcat_dump_*.log;
        echo 'Print JVM errors if provided by Kernel, and just check the logs from the last line of the previous call:';
        sudo dmesg -T;
        echo 'Print native JVM stacktrace if possible:';
        cat hs_err_pid*.log;
        set -e;

    - name: Upload reports as artifact
      timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
      if: success()
      uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
      with:
        # Check available parameters in: https://github.com/Wandalen/wretry.action/blob/master/action.yml
        # Retry to survive transient ENOTFOUND/DNS blips reaching the GitHub
        # artifact backend ("Failed to CreateArtifact: Unable to make
        # request: ENOTFOUND"). upload-artifact is a plain JS action, so it
        # is wrappable by wretry (unlike composite actions).
        action: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        attempt_limit: 3
        attempt_delay: 30000
        with: |
          # Check available parameters in: https://github.com/actions/upload-artifact/blob/main/action.yml
          name: reports_${{ matrix.android_api }}_${{ matrix.type }}_${{ matrix.host_os }}-artifacts
          path: app/build/reports
          if-no-files-found: error
          retention-days: 90
          overwrite: true
          include-hidden-files: true
          compression-level: 1
