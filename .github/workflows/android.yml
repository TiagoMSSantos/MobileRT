name: Android

on:
  workflow_dispatch:
  push:
    branches:
    - '**'
    tags-ignore:
    - '**'
    paths-ignore:
    - '*'
    - '**/**'
    - '!.github/workflows/android.yml'
    - '!.github/workflows/android-matrix.json'
    - '!.github/workflows/reusable-android.yml'
    - '!codecov.yml'
    - '!app/src/**/*.xml'
    - '!app/third_party/conan/Android/**'
    - "!.gitmodules"
    - '!scripts/compile_android.sh'
    - '!scripts/run_tests.sh'
    - '!scripts/run_tests_android.sh'
    - '!scripts/check_android.sh'
    - '!scripts/helper_functions.sh'
    - '!**/CMakeLists*'
    - '!**/*.java*'
    - '!**/*.kt*'
    - '!**/*.c*'
    - '!**/*.h'
    - '!**/*.hpp'
    - '!**/*gradle*'
    - '!sonar-project.properties'

permissions: {}

defaults:
  run:
    shell: sh
    working-directory: .

concurrency:
  group: ${{ github.workflow }} ${{ github.ref }}
  cancel-in-progress: true

# Default environment variables.
env:
  GITHUB_STEP_TIMEOUT_SMALL: 4
  GITHUB_STEP_TIMEOUT_MEDIUM: 10
  GITHUB_STEP_TIMEOUT_LONG: 20

jobs:
  Matrix:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    name: Set Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 2

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    # Sets permissions of the GITHUB_TOKEN to allow trigger another jobs
    permissions:
      actions: write

    steps:
      - name: Checkout
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Check available parameters in: https://github.com/actions/checkout/blob/main/action.yml
          lfs: true

      - name: Set Matrix
        id: set-matrix
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        shell: bash
        run: |
          # Android usage: https://apilevels.com
          MATRIX=$(echo $(cat .github/workflows/android-matrix.json) | sed 's/ //g');
          randomAndroidApi=$(shuf -i17-35 -n1);
          while [ "${randomAndroidApi}" = '19' ] || [ "${randomAndroidApi}" = '20' ] || [ "${randomAndroidApi}" = '21' ]; do
            randomAndroidApi=$(shuf -i17-35 -n1);
          done
          MATRIX=${MATRIX//XY/$randomAndroidApi};
          echo "Matrix: ${MATRIX}";
          echo "matrix=${MATRIX}" >> ${GITHUB_OUTPUT};

      - name: Free stale Actions caches
        timeout-minutes: ${{ fromJSON(env.GITHUB_STEP_TIMEOUT_SMALL) }}
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The binary-handoff (compiled_*) and report (reports_*) caches are
          # keyed as <prefix>_<sha>_<run_id>_<run_number>_... Entries from
          # FINISHED runs are dead weight that keeps the repo pinned at the
          # 10 GB Actions cache cap and LRU-evicts the in-flight handoff cache
          # before the late Sonar job restores it (fail-on-cache-miss hard
          # failure even when tests passed).
          #
          # SAFETY: a concurrently-running build on another branch has its own
          # run id and its Build job's compiled_* cache is still needed by its
          # own later jobs. So only delete a cache when its owning run is
          # already 'completed'. The current run is always kept. Pure cache
          # hygiene: no effect on build/test/emulator behaviour.
          set +e;
          page=1;
          while :; do
            entries=$(gh api "repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100&page=${page}" --jq '.actions_caches[] | "\(.id) \(.key)"' 2>/dev/null);
            if [ -z "${entries}" ]; then
              break;
            fi
            echo "${entries}" | while read -r id key; do
              case "${key}" in
                compiled_*|reports_*) ;;
                *) continue ;;
              esac
              cacheRunId=$(echo "${key}" | cut -d '_' -f3);
              # Skip if run id is not numeric (unexpected key shape) or is the
              # current run.
              case "${cacheRunId}" in
                ''|*[!0-9]*) continue ;;
              esac
              if [ "${cacheRunId}" = "${GITHUB_RUN_ID}" ]; then
                continue;
              fi
              runStatus=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${cacheRunId}" --jq '.status' 2>/dev/null);
              # Delete ONLY when the owning run is explicitly 'completed'. An
              # empty/unknown status (transient API error, or a purged run) is
              # treated as "keep" on purpose: a network blip must never cause
              # us to delete the cache of a still-running build. Stale caches
              # from truly-purged runs are rare and GitHub's own 7-day cache
              # eviction reclaims them anyway.
              if [ "${runStatus}" = 'completed' ]; then
                echo "Deleting stale cache (run ${cacheRunId} completed): ${key}";
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/caches/${id}" > /dev/null 2>&1 || true;
              else
                echo "Keeping cache (run ${cacheRunId} status='${runStatus:-unknown}'): ${key}";
              fi
            done;
            page=$((page + 1));
          done;
          true;

      - name: Check code coverage runs in current branch
        id: check_status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_REF#refs/heads/};
          echo "BRANCH: ${BRANCH}";
          echo "GITHUB_REPOSITORY: ${GITHUB_REPOSITORY}";
          responses_triggered=$(curl --fail-with-body -s -S \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/native.yml/runs?branch=${BRANCH}&head_sha=${GITHUB_SHA}");
          echo "response obtained";
          workflows_triggered=$(printf '%s\n' "${responses_triggered}" | jq '.total_count');
          workflows_all=$(( workflows_triggered ));
          echo "workflows triggered: ${workflows_all}";
          echo "workflows_all=${workflows_all}" >> ${GITHUB_OUTPUT};

      - name: Trigger code coverage if not running
        if: steps.check_status.outputs.workflows_all == '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_REF#refs/heads/};
          echo "BRANCH: ${BRANCH}";
          echo "GITHUB_REPOSITORY: ${GITHUB_REPOSITORY}";
          curl --fail-with-body -S -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/native.yml/dispatches \
            -d "{\"ref\":\"${BRANCH}\",\"inputs\":{\"code-coverage-only\":\"true\"}}";

  Android:
    needs: [Matrix]
    name: Android ${{ matrix.android_api }} ${{ matrix.type }} ${{ matrix.build_os }} (${{ matrix.android_api_device }} - ${{ matrix.target_os }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.Matrix.outputs.matrix) }}
    uses: ./.github/workflows/reusable-android.yml

    # Sets permissions of the GITHUB_TOKEN to allow delete cache and publish test results
    permissions:
      actions: write
      checks: write
      pull-requests: write # only required if `comment: true` was enabled

    with:
      build_os: ${{ matrix.build_os }}
      target_os: ${{ matrix.target_os }}
      android_api: ${{ matrix.android_api }}
      android_api_device: ${{ matrix.android_api_device }}
      type: ${{ matrix.type }}
    # If you might want to use a secret in the build or test job then you would need to pass secrets, inherit disables secret isolation
    secrets: inherit
