println('Gradle version: ' + gradle_version)
println('Gradle major version: ' + gradleVersionMajor)
println('Gradle minor version: ' + gradleVersionMinor)
def javaBinariesPath, javaUnitTestBinaries, javaAndroidTestBinaries, kotlinBinariesPath
if (gradleVersionMajor >= 9) {
    println('Gradle version is more recent than 9 so using new path to classes.')
    javaBinariesPath = 'compileDebugJavaWithJavac/classes/'
    javaUnitTestBinaries = 'compileDebugUnitTestJavaWithJavac/classes/'
    javaAndroidTestBinaries = 'compileDebugAndroidTestJavaWithJavac/classes/'
    // AGP 9 compiles Kotlin with the built-in Kotlin support, which writes the
    // classes to a different directory than the legacy Kotlin Gradle plugin.
    kotlinBinariesPath = 'build/intermediates/built_in_kotlinc/debug/compileDebugKotlin/classes/'
} else if (gradleVersionMajor >= 8 && gradleVersionMinor >= 3) {
    println('Gradle version is more recent than 8.3 so using new path to classes.')
    javaBinariesPath = 'compileDebugJavaWithJavac/classes/'
    javaUnitTestBinaries = 'compileDebugUnitTestJavaWithJavac/classes/'
    javaAndroidTestBinaries = 'compileDebugAndroidTestJavaWithJavac/classes/'
    kotlinBinariesPath = 'build/tmp/kotlin-classes/debug/'
} else {
    println('Gradle version is older than 8.3, so using legacy path to classes.')
    javaBinariesPath = 'classes/'
    javaUnitTestBinaries = 'classes/'
    javaAndroidTestBinaries = 'classes/'
    kotlinBinariesPath = 'build/tmp/kotlin-classes/debug/'
}

println('Android API version: ' + androidApiVersion)
println('NDK version: ' + ndk_version)
println('Test type: ' + systemTestType)
println('ABI Filters: ' + systemAbiFilters)
println('AndroidX appcompat version: ' + androidX_appcompat_version)
