///////////////////////////////////////////////////////////////////////////////
// Merge Jacoco reports from Unit Tests and Instrumentation Tests
///////////////////////////////////////////////////////////////////////////////
tasks.register('jacocoTestReport', JacocoReport) {
    dependsOn = [
        'test' + systemTestType.capitalize() + 'UnitTest',
        // connectedXAndroidTest runs the instrumentation tests and writes the
        // per-test JaCoCo .ec files on-device (routed through the test storage
        // service when the Orchestrator is on). It does NOT pull them to the
        // host. createXAndroidTestCoverageReport is the AGP task that pulls and
        // aggregates the on-device coverage into
        // build/outputs/code_coverage/<X>AndroidTest/connected/<device>/coverage.ec,
        // which is the only path executionData (**/*coverage.ec) below can see.
        // It already dependsOn connectedXAndroidTest, so depending on it pulls in
        // the test run as well; without it this report finds no execution data and
        // is silently SKIPPED (no html report generated). Coverage is debug-only
        // (release sets testCoverageEnabled false) and jacocoTestReport only runs
        // for the debug 'all' path, so systemTestType is always 'debug' here.
        'create' + systemTestType.capitalize() + 'AndroidTestCoverageReport',
    ]
    reports {
        xml.getRequired().set(true)
        html.getRequired().set(true)
    }

    // Set source files.
    def sourceFiles = files(["${project.projectDir}/src/main/java/**/*"]).getFiles()
    println('sourceFiles: ' + sourceFiles)
    sourceDirectories.setFrom(sourceFiles)

    // Set class files.
    def javaClasses = fileTree(
        dir: "${layout.buildDirectory.getAsFile().get().toString()}/intermediates/javac/debug/${javaBinariesPath}",
        // Exclude the 'BuildConfig.class' because it is an automatically generated file.
        excludes: ['**/BuildConfig.class', '**/package-info.class', '**/AgentJar.class'],
    )
    def kotlinClasses
    if (gradleVersionMajor >= 9) {
        kotlinClasses = fileTree(
            dir: "${layout.buildDirectory.getAsFile().get().toString()}/intermediates/built_in_kotlinc/debug/compileDebugKotlin/classes/",
            excludes: ['**/BuildConfig.class', '**/package-info.class', '**/AgentJar.class'],
        )
    } else {
        kotlinClasses = fileTree(
            dir: "${layout.buildDirectory.getAsFile().get().toString()}/tmp/kotlin-classes/debug/",
            excludes: ['**/BuildConfig.class', '**/package-info.class', '**/AgentJar.class'],
        )
    }
    def allClasses = javaClasses + kotlinClasses
    println('allClasses: ' + allClasses)
    classDirectories.setFrom(allClasses)

    // Set execution data files to analyze.
    // AGP 9 + AndroidX Test Orchestrator 1.6.x no longer emit a single
    // `coverage.ec`; each test writes its own `<Class>#<method>.ec` under
    // build/outputs/code_coverage/. Match every `.ec` so connected-test coverage
    // is picked up (otherwise jacocoTestReport is SKIPPED via its onlyIf, the html
    // dir is never created, and the downstream du check fails an otherwise-green run).
    executionData.setFrom(fileTree(
        dir: "${layout.buildDirectory.getAsFile().get().toString()}",
        includes: ['**/test*UnitTest.exec', '**/*.ec'],
    ))
}
