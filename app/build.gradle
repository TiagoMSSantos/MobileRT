///////////////////////////////////////////////////////////////////////////////
// Add third party dependencies
///////////////////////////////////////////////////////////////////////////////
dependencies {
    // Dependencies for the Android application
    println('Adding dependencies for MobileRT.')
    implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])

    println('Adding Android dependencies for MobileRT.')
    implementation "androidx.appcompat:appcompat:${androidX_appcompat_version}"
    implementation "androidx.core:core-ktx:${androidX_core_version}"

    println('Adding Java dependencies for MobileRT.')
    implementation 'com.google.guava:guava:33.6.0-android'
    implementation 'net.sourceforge.streamsupport:streamsupport:1.7.4'


    println('Adding dependencies for the instrumentation tests.')
    androidTestImplementation "androidx.test:core:${androidX_test_core_version}"
    androidTestImplementation "androidx.test:core-ktx:${androidX_test_core_version}"
    androidTestImplementation "androidx.test.espresso:espresso-intents:${androidX_test_espresso_version}"
    androidTestImplementation "androidx.test.ext:junit:${androidX_test_junit_version}"
    // Orchestrator + test-services APKs, installed onto the device by AGP for
    // connectedAndroidTest. Only added for API >= 16: their APK minSdk floor
    // makes the install fail (and break the leg) on API 15. Must stay in sync
    // with the `execution 'ANDROIDX_TEST_ORCHESTRATOR'` guard in testOptions.
    if (androidApiVersionValue >= 16) {
        androidTestUtil "androidx.test:orchestrator:${androidX_test_orchestrator_version}"
        // test-services provides the shared test storage content provider that
        // backs useTestStorageService, so the per-test JaCoCo .ec files from the
        // Orchestrator's separate processes are aggregated by AGP. Same API >= 16
        // guard. (AGP also auto-installs this as a buddy APK when the Orchestrator
        // is enabled; the explicit line pins the version.)
        androidTestUtil "androidx.test.services:test-services:${androidX_test_services_version}"
    }

    println('Enabling tracing for the instrumentation tests.')
    debugImplementation "androidx.test.espresso:espresso-core:${androidX_test_espresso_version}"


    println('Adding dependencies for the unit tests.')
    testImplementation 'org.assertj:assertj-core:3.27.7'
    testImplementation 'org.khronos:opengl-api:gl1.1-android-2.1_r1'
    testImplementation "org.powermock:powermock-module-junit4:${powermock_version}"
    testImplementation "org.powermock:powermock-api-easymock:${powermock_version}"
    testImplementation 'org.easymock:easymock:5.6.0'
    testImplementation 'org.springframework:spring-test:7.0.8'
}
