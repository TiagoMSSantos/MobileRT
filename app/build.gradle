///////////////////////////////////////////////////////////////////////////////
// Android setup
///////////////////////////////////////////////////////////////////////////////
android {
    namespace = 'puscas.mobilertapp'
    testNamespace = 'puscas.mobilertapp.test'

    // Set NDK version
    setNdkVersion ndk_version

    // Set build type for the tests
    setTestBuildType systemTestType

    // Setup required versions to compile
    compileSdkVersion 36
    setBuildToolsVersion '36.0.0'

    // Setup signing configurations
    signingConfigs {
        debug {
            setStoreFile file('MobileRT.jks')
            setStorePassword System.getenv("ANDROID_KEYSTORE_PASSWORD_DEBUG") ?: localProps["ANDROID_KEYSTORE_PASSWORD_DEBUG"]
            setKeyPassword System.getenv("ANDROID_KEY_PASSWORD_DEBUG") ?: localProps["ANDROID_KEY_PASSWORD_DEBUG"]
            setKeyAlias System.getenv("ANDROID_KEY_ALIAS_DEBUG") ?: localProps["ANDROID_KEY_ALIAS_DEBUG"]
        }
        release {
            setStoreFile file('MobileRT.jks')
            setStorePassword System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: localProps["ANDROID_KEYSTORE_PASSWORD"]
            setKeyPassword System.getenv("ANDROID_KEY_PASSWORD") ?: localProps["ANDROID_KEY_PASSWORD"]
            setKeyAlias System.getenv("ANDROID_KEY_ALIAS") ?: localProps["ANDROID_KEY_ALIAS"]
        }
    }

    // Set configurations lazily to avoid "resolving the special 'all' configuration" error
    configurations.configureEach {
        // Necessary to remove `listenablefuture` from dependencies:
        // https://stackoverflow.com/questions/56639529/duplicate-class-com-google-common-util-concurrent-listenablefuture-found-in-modu
        exclude group: 'com.google.guava', module: 'listenablefuture'
    }

    // Setup default configurations
    defaultConfig {
        // The minimum Android API version possible is 14 due to compatibility with Appcompat dependency.
        setMinSdkVersion "${androidApiVersion}"
        setTargetSdkVersion 36
        setTestInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        def runnerArgs = [
            'clearPackageData': 'false', 'disableAnalytics': 'true', 'waitForActivitiesToComplete': 'true'
        ]
        // clearPackageData is OFF on purpose. On API >= 16 the Orchestrator already
        // runs each test in its own process (fresh in-memory state per test), so we
        // do not need a disk wipe for isolation. clearPackageData triggered
        // clearApplicationUserData between tests, which deleted the read-only
        // fixtures staged once into the app-external dir (e.g. the teapot OBJ/MTL/CAM
        // under .../Android/data/puscas.mobilertapp/files/MobileRT). That wiped the
        // inputs FileSystemTest/TextureTest/RayTracingTest depend on, and also nuked
        // the on-device JaCoCo .ec file before AGP could pull it. The app persists
        // nothing to disk between tests, so leaving data in place is safe.
        // useTestStorageService is still enabled (API >= 16) so multi-process JaCoCo
        // .ec output is routed through the AndroidX test storage service and AGP
        // aggregates it across the per-test processes; requires the test-services
        // APK wired in below. Gated to API >= 16 to match the test-services minSdk.
        if (androidApiVersionValue >= 16) {
            runnerArgs['useTestStorageService'] = 'true'
        }
        testInstrumentationRunnerArguments = runnerArgs
        setApplicationId 'puscas.mobilertapp'
        setVersionName '1.0'
        setVersionCode 1
        setMultiDexEnabled true
        testHandleProfiling = false
        testFunctionalTest = false
        ndk {
            abiFilters systemAbiFilters
            setModuleName 'MobileRT'
        }
        externalNativeBuild {
            cmake {
                final def cLauncher = System.getenv('CMAKE_C_COMPILER_LAUNCHER')
                final def cxxLauncher = System.getenv('CMAKE_CXX_COMPILER_LAUNCHER')
                if (cLauncher && cxxLauncher) {
                    arguments '-DCMAKE_VERBOSE_MAKEFILE=OFF',
                              "-DCMAKE_C_COMPILER_LAUNCHER=${cLauncher}",
                              "-DCMAKE_CXX_COMPILER_LAUNCHER=${cxxLauncher}"
                } else {
                    arguments '-DCMAKE_VERBOSE_MAKEFILE=OFF'
                }
            }
        }
        javaCompileOptions {
            annotationProcessorOptions {
            }
        }
    }

    // Setup native configurations
    externalNativeBuild {
        cmake {
            setPath 'CMakeLists.txt'
            setVersion '4.0.2'
        }
    }

    // Set Java version
    compileOptions {
        setTargetCompatibility JavaVersion.VERSION_21
        setSourceCompatibility JavaVersion.VERSION_21
    }
    kotlin {
        compilerOptions {
            setJvmTarget(JvmTarget.JVM_21)
            allWarningsAsErrors = true
        }
    }

    // Set build types
    buildTypes {
        debug {
            setDebuggable true
            setJniDebuggable true
            // Coverage on by default; callers can disable it for a single run via
            // -DdisableTestCoverage=true (repeatable single-test job - coverage of
            // one test is meaningless and only risks the createDebugAndroidTest-
            // CoverageReport "no coverage data" failure).
            setTestCoverageEnabled !disableTestCoverage
            setVersionNameSuffix 'd'
            setRenderscriptOptimLevel 0
            setMinifyEnabled false
            setSigningConfig signingConfigs.debug
            setShrinkResources false
            ndk {
            }
        }
        release {
            setDebuggable false
            setJniDebuggable false
            setTestCoverageEnabled false
            setVersionNameSuffix 'r'
            setRenderscriptOptimLevel 3
            setMinifyEnabled false
            setSigningConfig signingConfigs.release
            setShrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            ndk {
            }
        }
    }

    // Setup product flavors
    productFlavors {
    }
    packagingOptions {
        resources {
            // Exclude some files from the package due to conflicts from different dependencies
            excludes += ['META-INF/LICENSE.md', 'META-INF/LICENSE-notice.md', 'META-INF/licenses/ASM', 'META-INF/versions/9/OSGI-INF/MANIFEST.MF']
        }
    }

    // Configure test options
    testOptions {
        unitTests.all {
            ignoreFailures = false
            minHeapSize = '128m'
            maxHeapSize = '512m'
            jvmArgs '-noverify', '-ea', '-Djdk.attach.allowAttachSelf=true',
                // Flags added for Java 9+ to be able to use reflection. because
                // Java Platform Module System that was introduced in Java 9, has an
                // implementation of strong encapsulation.
                // '--add-opens {A}/{package}={B}' (If the reflecting code is in a named module, 'B' can be replaced by its name.)
                '--add-opens=java.base/java.lang=ALL-UNNAMED',
                '--add-opens=java.base/java.util=ALL-UNNAMED',
                '--add-opens=java.base/java.util.concurrent=ALL-UNNAMED',
                '--add-opens=java.base/java.io=ALL-UNNAMED',
                '--add-opens=java.base/java.nio=ALL-UNNAMED',
                '--add-opens=java.logging/java.util.logging=ALL-UNNAMED',
                // Allow to use reflection in private native methods:
                '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED'
            jacoco {
                includeNoLocationClasses = true
                excludes = ['jdk.internal.*']
                excludeClassLoaders = ["*ClassLoader*"]
                // Explicitly set the JaCoCo destination file so it's known immediately
                destinationFile = file("${DEFAULT_BUILD_DIR_NAME}/jacoco/")
            }
        }
        unitTests.includeAndroidResources = true
        unitTests.returnDefaultValues = true
        setAnimationsDisabled true
        // Run each instrumentation test in its own process via the Test
        // Orchestrator: the app+test process is killed and respawned between
        // tests, giving each test a clean in-memory state without needing a disk
        // wipe (clearPackageData is intentionally off - see runnerArgs above).
        // Guarded to API >= 16: the orchestrator/test-services APKs have a minSdk
        // floor, so enabling it on API 15 would break that leg. Also backs the
        // multi-process JaCoCo coverage routed via useTestStorageService.
        if (androidApiVersionValue >= 16) {
            execution = 'ANDROIDX_TEST_ORCHESTRATOR'
        }
    }

    // Add resources directories to tests
    sourceSets {
        // Source files
        main {
            java.srcDirs += [javaDir, kotlinDir, mobileRtDir, componentsDir, scenesDir, systemDependentDir]
            kotlin.srcDirs += [kotlinDir]
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
        // Unit tests
        test {
            resources.srcDirs += ['src/test/resources']
        }
        // Instrumentation tests
        androidTest {
            manifest.srcFile 'src/androidTest/AndroidManifest.xml'
            resources.srcDirs += ['src/androidTest/resources']
        }
    }

    // adbOptions
    installation {
        installOptions ['-t']
    }

    // Setup linter options
    lint {
        enable 'WrongThreadInterprocedural', 'RtlHardcoded', 'RtlCompat', 'RtlEnabled'
        lintConfig = file('lint.xml')
        warningsAsErrors = true
        abortOnError = true
    }

    project.gradle.taskGraph.whenReady {
        android.productFlavors.configureEach { flavor ->
            // Capitalize (as Gradle is case-sensitive).
            def flavorName = flavor.name.substring(0, 1).toUpperCase() + flavor.name.substring(1)
            "connected${flavorName}DebugAndroidTest" {
                ignoreFailures = false
            }
        }
    }
}
