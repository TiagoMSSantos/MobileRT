distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-9.6.1-bin.zip
# Harden the wrapper download against transient CI network failures: a longer
# per-attempt timeout plus several backed-off retries (Gradle defaults are 10s /
# 0 retries, so a single dropped connection failed the whole build before Gradle
# even started). Kept in lockstep with the Wrapper task in build.gradle, which
# regenerates this file.
networkTimeout=20000
retries=8
retryBackOffMs=1000
# Skip the pre-download URL validation (a HEAD request that itself flaked on
# slow runners). The download is still over HTTPS to services.gradle.org; this
# only drops the reachability pre-check, not transport security.
validateDistributionUrl=false
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
